name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=backend --cov-report=xml --cov-report=html --cov-fail-under=17
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install Ruff
      run: |
        pip install "ruff>=0.8,<1"
    
    - name: Ruff check
      run: |
        ruff check backend/

  test-postgres-repositories:
    name: Repository layer (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: schedule
          POSTGRES_PASSWORD: repo_test_secret
          POSTGRES_DB: repo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U schedule -d repo_test"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 15
    env:
      PG_REPO_TEST_URL: postgresql+psycopg://schedule:repo_test_secret@localhost:5432/repo_test
      PYTEST_USE_POSTGRES_REPOS: "1"
      ADMIN_PASSWORD: TestP@ssw0rd!
      ADMIN_USERNAME: admin-test
      SECRET_KEY: test-secret-key-for-ci-repos
      FLASK_ENV: testing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run repository tests on PostgreSQL
        run: |
          pytest tests/repositories/ -q --tb=short

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint, test-postgres-repositories]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: |
        docker build -t schedule-optimizer:latest .
    
    - name: Test Docker image
      run: |
        docker run -d -p 5000:5000 \
          -e FLASK_ENV=testing \
          -e ADMIN_PASSWORD=ci-docker-smoke-password \
          -e SECRET_KEY=ci-docker-smoke-secret-key-32bytes-minimum-x \
          --name test-container schedule-optimizer:latest
        sleep 10
        curl -f http://localhost:5000/health || exit 1
        docker stop test-container
        docker rm test-container

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Run Bandit security scan
      run: |
        pip install bandit
        bandit -r backend/ -f json -o bandit-report.json || true
    
    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: bandit-report.json

