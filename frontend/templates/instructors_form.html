<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>أعضاء هيئة التدريس</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main">
    <div class="page-header mb-3">
      <div>
        <h1 class="page-title">أعضاء هيئة التدريس</h1>
        <p class="page-subtitle">إدارة الأساتذة داخل القسم والمتعاونين من خارج القسم</p>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <form id="instructor-form" class="row g-3">
          <input type="hidden" id="inst-id">
          <div class="col-md-4">
            <label for="inst-name" class="form-label">الاسم</label>
            <input type="text" id="inst-name" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label for="inst-type" class="form-label">النوع</label>
            <select id="inst-type" class="form-select">
              <option value="internal">من داخل القسم</option>
              <option value="external">متعاون من خارج القسم</option>
            </select>
          </div>
          <div class="col-md-3">
            <label for="inst-email" class="form-label">البريد الإلكتروني (اختياري)</label>
            <input type="email" id="inst-email" class="form-control">
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="inst-active" checked>
              <label class="form-check-label" for="inst-active">
                نشط
              </label>
            </div>
          </div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">حفظ</button>
            <button type="button" id="btn-reset" class="btn btn-outline-secondary">تفريغ الحقول</button>
          </div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h2 class="h6 mb-3">قائمة أعضاء هيئة التدريس</h2>
        <div class="table-responsive">
          <table class="table table-sm table-striped align-middle" id="instructors-table">
            <thead>
              <tr>
                <th style="width:5%;">#</th>
                <th>الاسم</th>
                <th>النوع</th>
                <th>البريد الإلكتروني</th>
                <th>الحالة</th>
                <th style="width:15%;">إجراءات</th>
              </tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function loadInstructors() {
      try {
        const resp = await fetch("/instructors/list");
        if (!resp.ok) {
          console.error("failed to load instructors", resp.statusText);
          return;
        }
        const data = await resp.json();
        const tbody = document.querySelector("#instructors-table tbody");
        tbody.innerHTML = "";
        (data.instructors || []).forEach((inst, idx) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${idx + 1}</td>
            <td>${inst.name || ""}</td>
            <td>${inst.type === "external" ? "متعاون من خارج القسم" : "من داخل القسم"}</td>
            <td>${inst.email || ""}</td>
            <td>${inst.is_active ? "نشط" : "موقوف"}</td>
            <td>
              <button type="button" class="btn btn-sm btn-outline-primary me-1" data-action="edit">تعديل</button>
              <button type="button" class="btn btn-sm btn-outline-danger" data-action="delete">حذف</button>
            </td>
          `;
          tr.dataset.id = inst.id;
          tr.dataset.name = inst.name || "";
          tr.dataset.type = inst.type || "internal";
          tr.dataset.email = inst.email || "";
          tr.dataset.active = inst.is_active ? "1" : "0";
          tbody.appendChild(tr);
        });
      } catch (e) {
        console.error(e);
      }
    }

    function resetForm() {
      document.getElementById("inst-id").value = "";
      document.getElementById("inst-name").value = "";
      document.getElementById("inst-type").value = "internal";
      document.getElementById("inst-email").value = "";
      document.getElementById("inst-active").checked = true;
    }

    document.getElementById("btn-reset").addEventListener("click", () => {
      resetForm();
    });

    document.getElementById("instructor-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const id = document.getElementById("inst-id").value || null;
      const name = document.getElementById("inst-name").value.trim();
      const type = document.getElementById("inst-type").value;
      const email = document.getElementById("inst-email").value.trim();
      const is_active = document.getElementById("inst-active").checked;

      if (!name) {
        alert("الاسم مطلوب");
        return;
      }

      try {
        const resp = await fetch("/instructors/save", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ id, name, type, email, is_active })
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          alert(data.message || "فشل الحفظ");
          return;
        }
        resetForm();
        await loadInstructors();
      } catch (e) {
        console.error(e);
        alert("حدث خطأ غير متوقع أثناء الحفظ");
      }
    });

    document.querySelector("#instructors-table tbody").addEventListener("click", async (ev) => {
      const btn = ev.target.closest("button[data-action]");
      if (!btn) return;
      const tr = btn.closest("tr");
      if (!tr) return;
      const action = btn.dataset.action;
      const id = tr.dataset.id;

      if (action === "edit") {
        document.getElementById("inst-id").value = id || "";
        document.getElementById("inst-name").value = tr.dataset.name || "";
        document.getElementById("inst-type").value = tr.dataset.type || "internal";
        document.getElementById("inst-email").value = tr.dataset.email || "";
        document.getElementById("inst-active").checked = tr.dataset.active !== "0";
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else if (action === "delete") {
        if (!confirm("هل تريد بالتأكيد حذف هذا العضو؟")) return;
        try {
          const resp = await fetch("/instructors/delete", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id })
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok) {
            alert(data.message || "فشل الحذف");
            return;
          }
          await loadInstructors();
        } catch (e) {
          console.error(e);
          alert("حدث خطأ غير متوقع أثناء الحذف");
        }
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      loadInstructors();
    });
  </script>
</body>
</html>
