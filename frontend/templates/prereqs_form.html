<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>إدارة المتطلبات Prereqs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body> {% include "base_nav.html" %} <main class="container-main">
  <div class="page-header">
    <div>
      <h1 class="page-title">إدارة المتطلبات بين المقررات</h1>
      <p class="page-subtitle">إضافة/حذف المتطلبات المسبقة للمقررات</p>
    </div>
  </div>

    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-md-4">
            <label class="form-label">المقرر</label>
            <select id="courseSelect" class="form-select"></select>
          </div>
          <div class="col-md-6">
            <label class="form-label">المقرر المطلوب (يمكن اختيار أكثر من عنصر)</label>
            <select id="reqSelect" class="form-select" multiple size="5"></select>
            <div class="small text-muted mt-1">اضغط Ctrl أو Shift لاختيار متعدد؛ سيتم إضافة كل عنصر كمتطلب للمقرر المحدد</div>
          </div>
          <div class="col-md-2 d-grid">
            <button id="btnAddPrereq" class="btn btn-primary">أضف متطلبات</button>
          </div>
        </div>
        <div id="pr_msg" class="mt-2"></div>
        <div class="mt-2 small mono small-muted">
          ملاحظة: لا يمكن إضافة متطلب لنفس المقرر، وسيتم التحذير من العلاقات الدائرية المباشرة (A ⇄ B).
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="mb-0">قائمة المتطلبات</h6>
          <div class="d-flex gap-2">
            <input id="filterInput" class="form-control form-control-sm" placeholder="فلترة بالاسم" style="max-width:240px">
            <button id="btnExportCSV" class="btn btn-outline-secondary btn-sm">تصدير CSV</button>
          </div>
        </div>
        <div id="prCount" class="small mono small-muted mb-2"></div>
        <div id="prList" class="list-group"></div>
      </div>
    </div>
  </div>

<script>
/* state */
let COURSES = [];
let PREREQS = []; // {course_name, required_course_name}

/* helpers */
function setMsg(kind, html){
  const el = document.getElementById('pr_msg');
  el.innerHTML = `<div class="alert alert-${kind} p-2 mb-0">${html}</div>`;
  setTimeout(()=>{ if(el) el.innerHTML=''; }, 5000);
}
async function fetchJSON(url, opts){
  const r = await fetch(url, opts);
  const j = await r.json().catch(()=>null);
  return {ok: r.ok, status: r.status, json: j};
}

/* load courses */
async function loadCourses(){
  const r = await fetchJSON('/list_courses');
  COURSES = Array.isArray(r.json) ? r.json : [];
  const cs = document.getElementById('courseSelect'), rs = document.getElementById('reqSelect');
  cs.innerHTML = '<option value="">-- اختر --</option>';
  rs.innerHTML = '';
  COURSES.forEach(c=>{
    const lbl = c.course_name + (c.course_code ? ' — '+c.course_code : '');
    const o1=document.createElement('option'); o1.value=c.course_name; o1.text=lbl; cs.appendChild(o1);
    const o2=document.createElement('option'); o2.value=c.course_name; o2.text=lbl; rs.appendChild(o2);
  });
}

/* load prereqs */
async function loadPrereqs(){
  const r = await fetchJSON('/list_prereqs');
  PREREQS = Array.isArray(r.json) ? r.json : [];
  renderPrereqs(PREREQS);
}

function renderPrereqs(list){
  const listEl = document.getElementById('prList');
  const countEl = document.getElementById('prCount');
  listEl.innerHTML = '';
  if(!list.length){
    countEl.textContent = 'عدد المتطلبات: 0';
    listEl.innerHTML = '<div class="text-muted">لا توجد متطلبات.</div>';
    return;
  }
  countEl.textContent = `عدد المتطلبات: ${list.length}`;
  list.forEach(r=>{
    const item = document.createElement('div');
    item.className = 'list-group-item d-flex justify-content-between align-items-center';
    item.innerHTML = `<div>${escapeHtml(r.course_name)} ← <em class="text-primary">${escapeHtml(r.required_course_name)}</em></div>`;
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm btn-danger';
    btn.textContent = 'حذف';
    btn.addEventListener('click', ()=> deletePrereq(r));
    item.appendChild(btn);
    listEl.appendChild(item);
  });
}

function escapeHtml(s){ return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

/* simple checks */
function existsPrereq(course, req){
  return PREREQS.some(r=> r.course_name === course && r.required_course_name === req);
}
function isImmediateCycle(course, req){
  return PREREQS.some(r=> r.course_name === req && r.required_course_name === course);
}

/* add prereq (batch) */
document.getElementById('btnAddPrereq').addEventListener('click', async ()=>{
  const course = document.getElementById('courseSelect').value;
  const reqSelect = document.getElementById('reqSelect');
  const selected = Array.from(reqSelect.selectedOptions).map(o=> o.value);

  if(!course || selected.length === 0){ setMsg('warning','اختر المقرر والمقرر/المقررات المطلوبة'); return; }

  // filter out any same-as-course and already-existing
  const items = [];
  const localConflicts = [];
  for(const req of selected){
    if(course === req){
      localConflicts.push({req, reason: 'المقرر نفسه'});
      continue;
    }
    if(existsPrereq(course, req)){
      localConflicts.push({req, reason: 'موجود سابقاً'});
      continue;
    }
    items.push({course_name: course, required_course_name: req});
  }

  if(items.length === 0){
    setMsg('info', `لم يتم إرسال أي متطلبات جديدة. ${localConflicts.map(c=>`${c.req}: ${c.reason}`).join('؛ ')}`);
    return;
  }

  // detect immediate cycles and warn per-request (but still allow user to proceed)
  const cycles = items.filter(it => isImmediateCycle(it.course_name, it.required_course_name));
  if(cycles.length){
    const proceed = confirm(`تنبيه: إضافة بعض هذه الأزواج ستُنشئ علاقات دائرية مباشرة: ${cycles.map(c=>c.required_course_name).join(', ')}. المتابعة؟`);
    if(!proceed) return;
  }

  // send batch payload to /courses/prereqs/add (which يدعم items[])
  const payload = { items: items };
  const res = await fetchJSON('/courses/prereqs/add', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });

  if(res.ok && res.json){
    const j = res.json;
    let msg = [];
    if(j.added && j.added.length) msg.push(`أضيفت ${j.added.length} متطلبات`);
    if(j.ignored && j.ignored.length) msg.push(`تجاهل ${j.ignored.length} مكررة`);
    if(j.missing && j.missing.length) msg.push(`غير موجودة ${j.missing.length}`);
    if(j.errors && j.errors.length) msg.push(`أخطاء ${j.errors.length}`);
    setMsg('success', msg.join('؛ ') || j.message || 'تمت المعالجة');
    await loadPrereqs();
  } else {
    const err = (res.json && res.json.message) ? res.json.message : `فشل الإرسال (HTTP ${res.status})`;
    setMsg('danger', err);
  }
});

/* delete prereq */
async function deletePrereq(row){
  if(!confirm('حذف المتطلب؟')) return;
  const res = await fetchJSON('/courses/prereqs/delete', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(row)
  });
  if(res.ok){
    await loadPrereqs();
  } else {
    setMsg('danger', res.json?.message || res.statusText || 'فشل الحذف');
  }
}

/* filter UI */
document.getElementById('filterInput').addEventListener('input', (e)=>{
  const q = e.target.value.trim().toLowerCase();
  if(!q) return renderPrereqs(PREREQS);
  const filtered = PREREQS.filter(r=>{
    return (r.course_name||'').toLowerCase().includes(q)
        || (r.required_course_name||'').toLowerCase().includes(q);
  });
  renderPrereqs(filtered);
});

/* export CSV */
document.getElementById('btnExportCSV').addEventListener('click', ()=>{
  if(!PREREQS.length){ return alert('لا توجد بيانات للتصدير'); }
  const rows = [['course_name','required_course_name']];
  PREREQS.forEach(r=> rows.push([r.course_name||'', r.required_course_name||'']));
  const csv = rows.map(r=> r.map(v=> String(v).replaceAll('"','""')).map(v=> `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='prereqs.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
});

/* startup */
(async function init(){ await loadCourses(); await loadPrereqs(); })();
</script>
</body>
</html>
