<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>أهداف ومخرجات الكلية والبرنامج</title>
  <link href="/static/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .om-level{border:1px solid #dee2e6;border-radius:.75rem;padding:1rem 1.25rem;margin-bottom:1rem;background:#f8fafc;}
    .om-level h2{font-size:1.1rem;margin-bottom:.35rem;}
    .om-chip{display:inline-block;padding:.35rem .65rem;border-radius:.5rem;background:#fff;border:1px solid #e9ecef;margin:.2rem;font-size:.85rem;}
    .om-chip strong{color:var(--bs-primary);}
    [data-bs-theme="dark"] .om-level{background:#212529;border-color:#373b3e;}
    [data-bs-theme="dark"] .om-chip{background:#2b3035;border-color:#495057;}
  </style>
</head>
<body>
{% include "base_nav.html" %}
<main class="container-main container-1100 theme-formal">
  <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <h1 class="page-title">أهداف ومخرجات الكلية والبرنامج</h1>
      <p class="page-subtitle">عرض تعريفي للقراءة فقط — التعديل من رئيس القسم أو ضمان الجودة</p>
    </div>
    <a class="btn btn-outline-secondary btn-sm" href="/my_courses">← مقرراتي</a>
  </div>
  <div id="loadMsg" class="text-muted small">جاري التحميل…</div>
  <div id="content" class="d-none">
    <div class="om-level" id="collegeBox"></div>
    <div class="om-level" id="programBox"></div>
    <p class="small text-muted mb-0">لتعريف مخرجات مقررك وربطها بالبرنامج استخدم <a href="/my_courses">صفحة المقرر</a> من مقرراتي.</p>
  </div>
</main>
<script>
(function(){
  function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function chips(items, codeKey, titleKey){
    if (!items || !items.length) return '<span class="text-muted small">لا بيانات معتمدة بعد.</span>';
    return items.map(it => '<span class="om-chip"><strong>'+esc(it[codeKey]||'')+'</strong> '+esc(it[titleKey]||it.title_ar||it.title||'')+'</span>').join('');
  }
  async function load(){
    const r = await fetch('/academic_quality/ilo/api/outcomes-map', {credentials:'include'});
    const j = await r.json().catch(() => ({}));
    const loadMsg = document.getElementById('loadMsg');
    if (!r.ok || j.status !== 'ok') {
      loadMsg.textContent = j.message || 'تعذر التحميل';
      return;
    }
    loadMsg.classList.add('d-none');
    document.getElementById('content').classList.remove('d-none');
    const college = j.college || {};
    document.getElementById('collegeBox').innerHTML =
      '<h2>الكلية</h2>' +
      '<p class="small text-muted mb-2">'+esc(college.name_ar || 'مستوى الكلية')+'</p>' +
      '<div class="mb-2"><span class="fw-semibold small d-block mb-1">أهداف استراتيجية / عامة</span>'+chips(college.goals,'code','title_ar')+'</div>' +
      '<div><span class="fw-semibold small d-block mb-1">مخرجات خريج الكلية (GLO)</span>'+chips(college.outcomes,'code','title_ar')+'</div>';
    const prog = j.program || {};
    document.getElementById('programBox').innerHTML =
      '<h2>البرنامج / التخصص</h2>' +
      '<p class="small text-muted mb-2">'+esc((prog.code ? prog.code+' — ' : '')+(prog.name_ar || 'برنامجك'))+'</p>' +
      '<div class="mb-2"><span class="fw-semibold small d-block mb-1">أهداف البرنامج</span>'+chips(prog.goals,'code','title_ar')+'</div>' +
      '<div><span class="fw-semibold small d-block mb-1">مخرجات البرنامج (PLO)</span>'+chips(prog.outcomes,'code','title_ar')+'</div>';
  }
  load();
})();
</script>
</body>
</html>
