<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>تقرير تعارضات الامتحانات</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link href="/static/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main">
    <div class="page-header">
      <div>
        <h1 class="page-title">تقرير تعارضات الامتحانات</h1>
        <p class="page-subtitle">عرض التعارضات حسب نوع الامتحان</p>
      </div>
      <div class="d-flex gap-2 align-items-end">
        <div>
          <label class="form-label mb-1">نوع الامتحان</label>
          <select id="examTypeSelect" class="form-select form-select-sm">
            <option value="midterm">منصف الفصل (Midterms)</option>
            <option value="final">نهائي (Finals)</option>
          </select>
        </div>
        <button id="btnReload" class="btn btn-outline-primary btn-sm">عرض التعارضات</button>
        <button id="btnPersist" class="btn btn-outline-secondary btn-sm">حفظ التعارضات</button>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h2 class="page-title" style="font-size:16px;margin-bottom:10px;">التعارضات</h2>
        <div class="table-responsive">
          <table id="tblConf" class="table table-bordered table-hover table-sm mb-0">
            <thead class="table-light">
              <tr>
                <th>student_id</th>
                <th>exam_date</th>
                <th>conflicting_courses</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

<script>
function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>\"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":"&#39;"}[m]; }); }

async function loadConflicts(){
  const t = document.getElementById('examTypeSelect').value;
  const r = await fetch(`/exams/${t}/conflicts`);
  const j = await r.json();
  const tbody = document.querySelector('#tblConf tbody'); tbody.innerHTML='';
  for(const c of j.conflicts || []){
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${escapeHtml(c.student_id)}</td><td>${escapeHtml(c.exam_date)}</td><td>${escapeHtml(c.conflicting_courses)}</td>`;
    tbody.appendChild(tr);
  }
}

async function persistConflicts(){
  const t = document.getElementById('examTypeSelect').value;
  const r = await fetch(`/exams/${t}/results_data`);
  const j = await r.json();
  // call persist endpoint via POST (we'll call the helper via a simple ad-hoc route if available) -- fallback: call backend persist (not exposed)
  // Instead we call the distribute endpoint with same dates to force refresh OR ask server to persist via an existing function.
  // For now we just show message about persistence availability.
  alert('لحفظ التعارضات في قاعدة البيانات استعمل زر الخادم (لم تُفعّل وظيفة الحفظ التلقائي في الواجهة).');
}

document.getElementById('btnReload').addEventListener('click', loadConflicts);
document.getElementById('btnPersist').addEventListener('click', persistConflicts);
// initial load
loadConflicts();
</script>
<script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
</body>
</html>
