<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>خريطة المتطلبات</title>
  <link href="/static/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .flow-img{
      width: 100%;
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 12px;
      background: #fff;
    }
    .hint{ color:#64748b; font-size:.9rem; }
  </style>
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main container-1100">
    <div class="page-header">
      <div>
        <h1 class="page-title">خريطة المتطلبات (Flowchart)</h1>
        <p class="page-subtitle">شجرة بسيطة لعرض تسلسل اعتماديات المقررات مع إمكانية التصدير PDF وPowerPoint</p>
      </div>
    </div>

    <div class="card mb-3 filter-section">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-12 col-md-5">
            <label class="form-label mb-1 small">مقرر (اختياري)</label>
            <select id="focusCourse" class="form-select form-select-sm">
              <option value="">— عرض كامل الخطة —</option>
            </select>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label mb-1 small">الاتجاه</label>
            <select id="direction" class="form-select form-select-sm">
              <option value="both">قبل وبعد</option>
              <option value="prereqs">المتطلبات فقط</option>
              <option value="dependents">ما بعده فقط</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label mb-1 small">العمق</label>
            <select id="depth" class="form-select form-select-sm">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
          <div class="col-12 col-md-2 d-grid">
            <button id="btnRefresh" class="btn btn-primary btn-sm">تحديث</button>
          </div>
        </div>
        <div class="d-flex flex-wrap gap-2 mt-3">
          <button id="btnDownloadPDF" class="btn btn-outline-danger btn-sm">⬇️ تصدير PDF</button>
          <button id="btnDownloadPPT" class="btn btn-outline-success btn-sm">⬇️ تصدير PowerPoint</button>
          <div class="hint align-self-center ms-auto">ملاحظة: إذا كانت الخريطة كبيرة، استخدم “مقرر محدد” + عمق 2 أو 3.</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <img id="flowImg" class="flow-img" alt="Prereqs Flowchart"/>
      </div>
    </div>
  </main>

  <script>
    async function fetchJSON(url, opts){
      const r = await fetch(url, opts);
      const j = await r.json().catch(()=>null);
      return {ok:r.ok, status:r.status, json:j};
    }
    function qs(){
      const course = (document.getElementById('focusCourse')?.value || '').trim();
      const direction = (document.getElementById('direction')?.value || 'both').trim();
      const depth = (document.getElementById('depth')?.value || '2').trim();
      const p = new URLSearchParams();
      if (course) p.set('course', course);
      p.set('direction', direction);
      p.set('depth', depth);
      return p.toString();
    }
    function refreshImage(){
      const img = document.getElementById('flowImg');
      const q = qs();
      // cache-bust
      const cb = 'cb=' + Date.now();
      img.src = '/courses/prereqs/flowchart/png?' + (q ? (q + '&') : '') + cb;
    }
    async function loadCourses(){
      const r = await fetchJSON('/list_courses');
      const arr = Array.isArray(r.json) ? r.json : [];
      const sel = document.getElementById('focusCourse');
      if (!sel) return;
      // keep first option
      const first = sel.options[0];
      sel.innerHTML = '';
      sel.appendChild(first);
      arr.forEach(c=>{
        const name = (c.course_name || '').trim();
        if (!name) return;
        const code = (c.course_code || '').trim();
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = code ? (name + ' — ' + code) : name;
        sel.appendChild(opt);
      });
    }

    document.getElementById('btnRefresh')?.addEventListener('click', refreshImage);
    document.getElementById('btnDownloadPDF')?.addEventListener('click', ()=>{
      window.open('/courses/prereqs/flowchart/pdf?' + qs(), '_blank');
    });
    document.getElementById('btnDownloadPPT')?.addEventListener('click', ()=>{
      window.open('/courses/prereqs/flowchart/pptx?' + qs(), '_blank');
    });

    (async function init(){
      await loadCourses();
      refreshImage();
    })();
  </script>
</body>
</html>
