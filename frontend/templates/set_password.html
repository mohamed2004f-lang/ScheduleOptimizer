<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>تعيين كلمة المرور</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main container-700">
    <div class="page-header">
      <div>
        <h1 class="page-title">تعيين كلمة المرور</h1>
        <p class="page-subtitle">هذا الرابط مخصص لتفعيل الحساب لأول مرة</p>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div id="msg" class="mb-2"></div>

        <div class="mb-2">
          <label class="form-label">كلمة المرور الجديدة</label>
          <input id="pw1" type="password" class="form-control" autocomplete="new-password" minlength="8">
        </div>
        <div class="mb-3">
          <label class="form-label">تأكيد كلمة المرور</label>
          <input id="pw2" type="password" class="form-control" autocomplete="new-password" minlength="8">
        </div>

        <button id="btnSet" class="btn btn-primary">حفظ</button>
      </div>
    </div>
  </main>

  <script>
    const TOKEN = "{{ token }}";
    function setMsg(kind, text){
      document.getElementById('msg').innerHTML = text ? `<div class="alert alert-${kind} p-2 mb-0">${text}</div>` : '';
    }
    async function submitPw(){
      const p1 = document.getElementById('pw1').value || '';
      const p2 = document.getElementById('pw2').value || '';
      if(p1.length < 8){
        setMsg('warning','كلمة المرور يجب ألا تقل عن 8 أحرف.');
        return;
      }
      if(p1 !== p2){
        setMsg('warning','كلمتا المرور غير متطابقتين.');
        return;
      }
      const r = await fetch(`/auth/invite/${encodeURIComponent(TOKEN)}`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({password: p1})
      });
      const j = await r.json().catch(()=>null);
      if(r.ok){
        setMsg('success', j?.message || 'تم الحفظ. سيتم تحويلك لصفحة الدخول...');
        setTimeout(()=>{ window.location.href = '/login'; }, 1200);
      } else {
        setMsg('danger', j?.message || 'فشل الحفظ');
      }
    }
    document.getElementById('btnSet').addEventListener('click', submitPw);
  </script>
</body>
</html>
