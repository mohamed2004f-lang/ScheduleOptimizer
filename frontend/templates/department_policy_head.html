<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>سياسة نظام التخرج للقسم</title>
  <link href="/static/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main container-1100">
    <div class="page-header mb-3">
      <div>
        <h1 class="page-title">اقتراح سياسة نظام التخرج</h1>
        <p class="page-subtitle">رئيس القسم: إعداد المسودة ثم إرسالها لاعتماد الأدمن الرئيسي</p>
      </div>
    </div>

    <div id="msgBox" class="mb-2"></div>

    <div class="card mb-3">
      <div class="card-header"><strong>إنشاء مسودة جديدة</strong></div>
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-md-3">
            <label class="form-label">النظام</label>
            <select id="planCode" class="form-select">
              <option value="150">150 وحدة</option>
              <option value="155">155 وحدة</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">الحد الأدنى للوحدات</label>
            <input id="minUnits" type="number" min="0" class="form-control" value="150">
          </div>
          <div class="col-md-2">
            <label class="form-label">فصل السريان</label>
            <select id="effectiveTerm" class="form-select">
              <option value="">فوري</option>
              <option value="ربيع">ربيع</option>
              <option value="صيف">صيف</option>
              <option value="خريف">خريف</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">سنة السريان</label>
            <input id="effectiveYear" class="form-control" placeholder="مثال: 2026">
          </div>
          <div class="col-md-2">
            <label class="form-label">ملاحظات</label>
            <input id="notes" class="form-control" placeholder="تفاصيل التعديل المقترح">
          </div>
          <div class="col-auto">
            <button id="btnPropose" class="btn btn-primary">حفظ كمسودة</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <strong>سياسات القسم</strong>
        <button id="btnReload" class="btn btn-sm btn-outline-primary">تحديث</button>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-sm table-bordered">
            <thead>
              <tr>
                <th>المعرف</th>
                <th>النظام</th>
                <th>الحد الأدنى للوحدات</th>
                <th>الحالة</th>
                <th>السريان من</th>
                <th>ملاحظة</th>
                <th>إجراء</th>
              </tr>
            </thead>
            <tbody id="rowsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    function showMsg(text, kind='info'){
      const box = document.getElementById('msgBox');
      if(!box) return;
      box.innerHTML = `<div class="alert alert-${kind} p-2 mb-0">${text}</div>`;
      setTimeout(()=>{ box.innerHTML=''; }, 5000);
    }

    function statusBadge(st){
      const s = String(st || '').trim();
      if(s === 'approved') return '<span class="badge bg-success">معتمد</span>';
      if(s === 'pending_approval') return '<span class="badge bg-warning text-dark">قيد المراجعة</span>';
      if(s === 'rejected') return '<span class="badge bg-danger">مرفوض</span>';
      return '<span class="badge bg-secondary">مسودة</span>';
    }

    async function loadRows(){
      const r = await fetch('/department_policies/head/list', { credentials:'include' });
      const j = await r.json().catch(()=>null);
      const body = document.getElementById('rowsBody');
      if(!body) return;
      body.innerHTML = '';
      if(!r.ok){
        showMsg((j && j.message) ? j.message : 'تعذر تحميل البيانات', 'danger');
        return;
      }
      const items = (j && j.items) || [];
      items.forEach(it=>{
        const canSubmit = (it.status === 'draft' || it.status === 'rejected');
        const reason = (it.rejection_reason || '').trim();
        const noteTxt = (it.notes || '').trim() + (reason ? `\nسبب الرفض: ${reason}` : '');
        const effFrom = [it.effective_from_term || '', it.effective_from_year || ''].filter(Boolean).join(' ') || 'فوري';
        body.insertAdjacentHTML(
          'beforeend',
          `<tr>
            <td>${it.id}</td>
            <td>${it.plan_code || ''}</td>
            <td>${it.min_total_units || 0}</td>
            <td>${statusBadge(it.status)}</td>
            <td>${effFrom}</td>
            <td><div style="white-space:pre-line">${noteTxt || ''}</div></td>
            <td>${canSubmit ? `<button class="btn btn-sm btn-outline-primary btn-submit" data-id="${it.id}">إرسال للاعتماد</button>` : ''}</td>
          </tr>`
        );
      });
      body.querySelectorAll('.btn-submit').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const id = btn.dataset.id;
          const rr = await fetch(`/department_policies/head/submit/${encodeURIComponent(id)}`, {
            method:'POST',
            credentials:'include',
            headers:{ 'Content-Type':'application/json' },
            body:'{}'
          });
          const jj = await rr.json().catch(()=>null);
          if(rr.ok){
            showMsg('تم إرسال السياسة للاعتماد', 'success');
            loadRows();
          }else{
            showMsg((jj && jj.message) ? jj.message : 'فشل الإرسال', 'danger');
          }
        });
      });
    }

    document.getElementById('btnPropose').addEventListener('click', async ()=>{
      const payload = {
        plan_code: (document.getElementById('planCode').value || '').trim(),
        min_total_units: Number(document.getElementById('minUnits').value || 0),
        effective_from_term: (document.getElementById('effectiveTerm').value || '').trim(),
        effective_from_year: (document.getElementById('effectiveYear').value || '').trim(),
        notes: (document.getElementById('notes').value || '').trim(),
      };
      const r = await fetch('/department_policies/head/propose', {
        method:'POST',
        credentials:'include',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify(payload),
      });
      const j = await r.json().catch(()=>null);
      if(r.ok){
        showMsg('تم حفظ المسودة بنجاح', 'success');
        document.getElementById('notes').value = '';
        document.getElementById('effectiveTerm').value = '';
        document.getElementById('effectiveYear').value = '';
        loadRows();
      }else{
        showMsg((j && j.message) ? j.message : 'فشل حفظ المسودة', 'danger');
      }
    });

    document.getElementById('btnReload').addEventListener('click', loadRows);
    window.addEventListener('DOMContentLoaded', loadRows);
  </script>
</body>
</html>
