<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>تقرير الإضافة والإسقاط</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
{% include "base_nav.html" %}

<main class="container-main container-1100">
  <div class="page-header">
    <div>
      <h1 class="page-title">تقرير الإضافة والإسقاط</h1>
      <p class="page-subtitle">سجل المواد المضافة والمسقطة مع تواريخ الإضافة والإسقاط ومنفّذ العملية</p>
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <button type="button" class="btn btn-primary btn-sm" id="btnApplyFilters">تطبيق الفلتر</button>
      <a class="btn btn-outline-success btn-sm" id="btnExportExcel" href="#">تصدير Excel</a>
      <a class="btn btn-outline-danger btn-sm" id="btnExportPdf" href="#" target="_blank">تصدير PDF</a>
      <button type="button" class="btn btn-outline-danger btn-sm" id="btnDeleteByFilter" title="أدمن فقط">حذف السجلات المطابقة للفلتر</button>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <h6 class="card-title mb-2">فلترة التقرير</h6>
      <div class="row g-2 align-items-end">
        <div class="col-md-2">
          <label class="form-label small mb-0">من تاريخ</label>
          <input type="date" id="filterDateFrom" class="form-control form-control-sm">
        </div>
        <div class="col-md-2">
          <label class="form-label small mb-0">إلى تاريخ</label>
          <input type="date" id="filterDateTo" class="form-control form-control-sm">
        </div>
        <div class="col-md-2">
          <label class="form-label small mb-0">رقم الطالب</label>
          <input type="text" id="filterStudentId" class="form-control form-control-sm" placeholder="اختياري">
        </div>
        <div class="col-md-2">
          <label class="form-label small mb-0">العملية</label>
          <select id="filterAction" class="form-select form-select-sm">
            <option value="">الكل</option>
            <option value="add">إضافة</option>
            <option value="drop">إسقاط</option>
            <option value="change">تعديل</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label small mb-0">المقرر (بحث)</label>
          <input type="text" id="filterCourseName" class="form-control form-control-sm" placeholder="اسم أو رمز">
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div id="msg" class="mb-2"></div>
      <div class="table-responsive">
        <table class="table table-sm table-bordered mb-0" id="tbl">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>التاريخ والوقت</th>
              <th>رقم الطالب</th>
              <th>اسم الطالب</th>
              <th>الفصل</th>
              <th>المقرر</th>
              <th>الرمز</th>
              <th class="text-center">الوحدات</th>
              <th>العملية</th>
              <th>منفّذ بواسطة</th>
              <th>سبب / ملاحظات</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
async function fetchJSON(url, opts){
  const r = await fetch(url, opts);
  const j = await r.json().catch(()=>null);
  return {ok:r.ok,status:r.status,json:j};
}
function setMsg(kind, text){
  const el = document.getElementById('msg');
  el.innerHTML = text ? `<div class="alert alert-${kind} p-2 mb-0">${text}</div>` : '';
}
function escapeHtml(s){ if(s==null||s===undefined) return ''; const t=document.createElement('div'); t.textContent=s; return t.innerHTML; }

function buildQueryParams(){
  const p = new URLSearchParams();
  const dateFrom = document.getElementById('filterDateFrom')?.value?.trim();
  const dateTo = document.getElementById('filterDateTo')?.value?.trim();
  const studentId = document.getElementById('filterStudentId')?.value?.trim();
  const action = document.getElementById('filterAction')?.value?.trim();
  const courseName = document.getElementById('filterCourseName')?.value?.trim();
  if(dateFrom) p.set('date_from', dateFrom);
  if(dateTo) p.set('date_to', dateTo);
  if(studentId) p.set('student_id', studentId);
  if(action) p.set('action', action);
  if(courseName) p.set('course_name', courseName);
  return p.toString();
}

async function load(){
  const qs = buildQueryParams();
  const url = '/students/registration_changes_report' + (qs ? '?' + qs : '');
  const r = await fetchJSON(url);
  const tb = document.querySelector('#tbl tbody');
  tb.innerHTML = '';
  const excelLink = document.getElementById('btnExportExcel');
  const pdfLink = document.getElementById('btnExportPdf');
  excelLink.href = '/students/registration_changes_report/excel' + (qs ? '?' + qs : '');
  if (pdfLink) pdfLink.href = '/students/registration_changes_report/pdf' + (qs ? '?' + qs : '');

  if(!r.ok){
    setMsg('danger', r.json?.message || 'فشل تحميل التقرير');
    return;
  }
  const items = r.json?.items || [];
  if(!items.length){
    tb.innerHTML = '<tr><td colspan="11" class="text-center text-muted">لا توجد سجلات تطابق الفلتر</td></tr>';
    setMsg('info', 'لا توجد بيانات. جرّب توسيع نطاق التاريخ أو إزالة الفلاتر.');
    return;
  }
  setMsg('', '');
  const actionLabels = { add: 'إضافة', drop: 'إسقاط', change: 'تعديل' };
  items.forEach((it, idx)=>{
    const tr = document.createElement('tr');
    const actionLabel = actionLabels[it.action] || it.action || '';
    const actionClass = it.action === 'add' ? 'text-success' : (it.action === 'drop' ? 'text-danger' : 'text-secondary');
    tr.innerHTML = `
      <td>${idx+1}</td>
      <td class="small">${escapeHtml(it.action_time || '')}</td>
      <td>${escapeHtml(it.student_id || '')}</td>
      <td>${escapeHtml(it.student_name || '')}</td>
      <td class="small">${escapeHtml(it.term || '')}</td>
      <td>${escapeHtml(it.course_name || '')}</td>
      <td class="small">${escapeHtml(it.course_code || '')}</td>
      <td class="text-center">${it.units ?? ''}</td>
      <td class="${actionClass}">${actionLabel}</td>
      <td class="small">${escapeHtml(it.performed_by || '')}</td>
      <td class="small text-muted">${escapeHtml(it.reason || it.notes || '')}</td>
    `;
    tb.appendChild(tr);
  });
}

document.getElementById('btnApplyFilters').addEventListener('click', function(){ load(); });

document.getElementById('btnDeleteByFilter').addEventListener('click', async function(){
  if(!confirm('سيتم حذف كل السجلات المطابقة للفلتر الحالي من التقرير بشكل نهائي. هل أنت متأكد؟')) return;
  const qs = buildQueryParams();
  const params = new URLSearchParams(qs);
  const body = {
    date_from: params.get('date_from') || '',
    date_to: params.get('date_to') || '',
    student_id: params.get('student_id') || '',
    action: params.get('action') || '',
    course_name: params.get('course_name') || '',
  };
  const r = await fetchJSON('/students/registration_changes_report/delete', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if(!r.ok){
    setMsg('danger', r.json?.message || 'فشل الحذف');
    return;
  }
  const deleted = r.json?.deleted ?? 0;
  setMsg('success', `تم حذف ${deleted} سجل/سجلات مطابقة للفلتر.`);
  await load();
});

load();
</script>

</body>
</html>
