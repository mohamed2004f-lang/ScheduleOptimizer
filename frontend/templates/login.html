<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تسجيل الدخول - Schedule Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="/static/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/static/images/mech_logo_small.png" alt="شعار كلية الهندسة">
    </div>
    <h1 class="auth-title">تسجيل الدخول</h1>
    <p class="auth-subtitle">نظام إدارة الجدول الدراسي — جامعة درنة</p>

    {% if login_error %}
    <div class="alert alert-danger mb-3">{{ login_error }}</div>
    {% endif %}

    <div id="loginStatus"></div>

    <form id="loginForm" method="post" action="/auth/login">
      <div class="mb-3">
        <label for="username" class="form-label">اسم المستخدم أو الرقم</label>
        <input type="text" class="form-control" id="username" name="username" required autocomplete="username" placeholder="مثال: ahmed أو 20201234">
        <div class="form-text">الطالب: الرقم الدراسي — الأستاذ: الرقم الأكاديمي</div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">كلمة المرور</label>
        <div class="input-group">
          <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password" placeholder="أدخل كلمة المرور">
          <button class="btn btn-outline-secondary" type="button" id="togglePassword" aria-label="إظهار كلمة المرور">👁</button>
        </div>
      </div>

      <div class="mb-3 form-check">
        <input class="form-check-input" type="checkbox" name="remember" value="1" id="rememberMe">
        <label class="form-check-label" for="rememberMe">تذكرني</label>
      </div>

      <button type="submit" class="btn btn-primary w-100" id="loginBtn">
        <span id="loginBtnText">تسجيل الدخول</span>
        <span id="loginBtnSpinner" class="spinner-border spinner-border-sm ms-2" style="display: none;" role="status"></span>
      </button>
    </form>

    <div class="mt-4 text-center">
      <small class="text-muted">
        حساب جديد؟ ستصلك رسالة تفعيل على البريد لتعيين كلمة المرور.
      </small>
    </div>
  </div>

  <script>
    (function () {
      const h = window.location.hostname;
      if (window.location.protocol === 'http:' && h !== 'localhost' && h !== '127.0.0.1') {
        window.location.replace('https://' + window.location.host + window.location.pathname + window.location.search);
      }
    })();

    document.getElementById('togglePassword')?.addEventListener('click', function() {
      const inp = document.getElementById('password');
      if (!inp) return;
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      this.textContent = show ? '🙈' : '👁';
    });

    document.getElementById('loginForm')?.addEventListener('submit', function() {
      const loginBtn = document.getElementById('loginBtn');
      const loginBtnText = document.getElementById('loginBtnText');
      const loginBtnSpinner = document.getElementById('loginBtnSpinner');
      const alertBox = document.getElementById('loginStatus');
      if (loginBtn) loginBtn.disabled = true;
      if (loginBtnText) loginBtnText.textContent = 'جاري تسجيل الدخول...';
      if (loginBtnSpinner) loginBtnSpinner.style.display = 'inline-block';
      if (alertBox) {
        alertBox.innerHTML = '<div class="alert alert-info mb-3">جاري التحقق وتسجيل الدخول...</div>';
      }
    });
  </script>
</body>
</html>
