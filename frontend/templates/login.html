<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>تسجيل الدخول - Schedule Optimizer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/static/images/mech_logo_small.png" alt="شعار كلية الهندسة">
    </div>
    <h1 class="auth-title">تسجيل الدخول</h1>
    <p class="auth-subtitle">نظام إدارة الجدول الدراسي</p>

    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">اسم المستخدم</label>
        <input type="text" class="form-control" id="username" name="username" required autocomplete="username" placeholder="أدخل اسم المستخدم">
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">كلمة المرور</label>
        <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password" placeholder="أدخل كلمة المرور">
      </div>

      <div class="mb-3 form-check">
        <input class="form-check-input" type="checkbox" value="1" id="rememberMe">
        <label class="form-check-label" for="rememberMe">تذكرني</label>
      </div>

      <div id="alertMessage"></div>

      <button type="submit" class="btn btn-primary w-100" id="loginBtn">
        <span id="loginBtnText">تسجيل الدخول</span>
        <span id="loginBtnSpinner" class="spinner-border spinner-border-sm ms-2" style="display: none;" role="status"></span>
      </button>
    </form>

    <div class="mt-4 text-center">
      <small class="text-muted">
        لتغيير كلمة المرور، راجع ملف config.py أو متغيرات البيئة
      </small>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const alertDiv = document.getElementById('alertMessage');
      const loginBtn = document.getElementById('loginBtn');
      const loginBtnText = document.getElementById('loginBtnText');
      const loginBtnSpinner = document.getElementById('loginBtnSpinner');

      // إخفاء أي رسائل سابقة
      alertDiv.innerHTML = '';
      
      // تعطيل الزر وإظهار spinner
      loginBtn.disabled = true;
      loginBtnText.textContent = 'جاري تسجيل الدخول...';
      loginBtnSpinner.style.display = 'inline-block';

      try {
        const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
        const remember = !!document.getElementById('rememberMe')?.checked;
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(csrfToken ? {'X-CSRFToken': csrfToken} : {}),
          },
          body: JSON.stringify({ username, password, remember }),
          credentials: 'include' // مهم للجلسات
        });

        const data = await response.json();

        if (response.ok && data.status === 'ok') {
          // نجح تسجيل الدخول
          alertDiv.innerHTML = '<div class="alert alert-success">تم تسجيل الدخول بنجاح! جاري التوجيه...</div>';
          
          // الانتظار قليلاً ثم التوجيه
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          // فشل تسجيل الدخول
          alertDiv.innerHTML = `<div class="alert alert-danger">${data.message || 'فشل تسجيل الدخول. تحقق من اسم المستخدم وكلمة المرور.'}</div>`;
          
          // إعادة تفعيل الزر
          loginBtn.disabled = false;
          loginBtnText.textContent = 'تسجيل الدخول';
          loginBtnSpinner.style.display = 'none';
        }
      } catch (error) {
        console.error('Login error:', error);
        alertDiv.innerHTML = '<div class="alert alert-danger">حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.</div>';
        
        // إعادة تفعيل الزر
        loginBtn.disabled = false;
        loginBtnText.textContent = 'تسجيل الدخول';
        loginBtnSpinner.style.display = 'none';
      }
    });

    // التحقق من حالة تسجيل الدخول عند تحميل الصفحة
    window.addEventListener('load', async function() {
      try {
        const response = await fetch('/auth/check', {
          credentials: 'include'
        });
        const data = await response.json();
        
        if (data.authenticated) {
          // المستخدم مسجل دخول بالفعل، توجيهه للصفحة الرئيسية
          window.location.href = '/';
        }
      } catch (error) {
        console.error('Auth check error:', error);
      }
    });
  </script>
</body>
</html>
