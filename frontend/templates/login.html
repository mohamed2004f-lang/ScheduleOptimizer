<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تسجيل الدخول - Schedule Optimizer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #072f5f 0%, #1e6fb8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h1 {
      color: #072f5f;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .login-header p {
      color: #6c757d;
      margin: 0;
    }
    .form-label {
      font-weight: 600;
      color: #072f5f;
      margin-bottom: 8px;
    }
    .btn-login {
      background: linear-gradient(135deg, #072f5f 0%, #1e6fb8 100%);
      border: none;
      padding: 12px;
      font-weight: 600;
      width: 100%;
      margin-top: 10px;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #1e6fb8 0%, #072f5f 100%);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .alert {
      margin-top: 15px;
    }
    .logo-container {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo-container img {
      height: 60px;
      width: auto;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-container">
      <img src="/static/images/mech_logo_small.png" alt="شعار كلية الهندسة" class="mech-logo">
    </div>
    <div class="login-header">
      <h1>تسجيل الدخول</h1>
      <p>نظام إدارة الجدول الدراسي</p>
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">اسم المستخدم</label>
        <input type="text" class="form-control" id="username" name="username" required autocomplete="username" placeholder="أدخل اسم المستخدم">
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">كلمة المرور</label>
        <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password" placeholder="أدخل كلمة المرور">
      </div>

      <div id="alertMessage"></div>

      <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
        <span id="loginBtnText">تسجيل الدخول</span>
        <span id="loginBtnSpinner" class="spinner-border spinner-border-sm ms-2" style="display: none;" role="status"></span>
      </button>
    </form>

    <div class="mt-4 text-center">
      <small class="text-muted">
        الافتراضي: <code>admin</code> / <code>admin123</code>
      </small>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const alertDiv = document.getElementById('alertMessage');
      const loginBtn = document.getElementById('loginBtn');
      const loginBtnText = document.getElementById('loginBtnText');
      const loginBtnSpinner = document.getElementById('loginBtnSpinner');

      // إخفاء أي رسائل سابقة
      alertDiv.innerHTML = '';
      
      // تعطيل الزر وإظهار spinner
      loginBtn.disabled = true;
      loginBtnText.textContent = 'جاري تسجيل الدخول...';
      loginBtnSpinner.style.display = 'inline-block';

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ username, password }),
          credentials: 'include' // مهم للجلسات
        });

        const data = await response.json();

        if (response.ok && data.status === 'ok') {
          // نجح تسجيل الدخول
          alertDiv.innerHTML = '<div class="alert alert-success">تم تسجيل الدخول بنجاح! جاري التوجيه...</div>';
          
          // الانتظار قليلاً ثم التوجيه
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          // فشل تسجيل الدخول
          alertDiv.innerHTML = `<div class="alert alert-danger">${data.message || 'فشل تسجيل الدخول. تحقق من اسم المستخدم وكلمة المرور.'}</div>`;
          
          // إعادة تفعيل الزر
          loginBtn.disabled = false;
          loginBtnText.textContent = 'تسجيل الدخول';
          loginBtnSpinner.style.display = 'none';
        }
      } catch (error) {
        console.error('Login error:', error);
        alertDiv.innerHTML = '<div class="alert alert-danger">حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.</div>';
        
        // إعادة تفعيل الزر
        loginBtn.disabled = false;
        loginBtnText.textContent = 'تسجيل الدخول';
        loginBtnSpinner.style.display = 'none';
      }
    });

    // التحقق من حالة تسجيل الدخول عند تحميل الصفحة
    window.addEventListener('load', async function() {
      try {
        const response = await fetch('/auth/check', {
          credentials: 'include'
        });
        const data = await response.json();
        
        if (data.authenticated) {
          // المستخدم مسجل دخول بالفعل، توجيهه للصفحة الرئيسية
          window.location.href = '/';
        }
      } catch (error) {
        console.error('Auth check error:', error);
      }
    });
  </script>
</body>
</html>
