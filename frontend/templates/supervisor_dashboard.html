<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لوحة المشرف الأكاديمي</title>
  <link href="/static/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main">
    <div class="page-header mb-3">
      <div>
        <h1 class="page-title">لوحة المشرف الأكاديمي</h1>
        <p class="page-subtitle">عرض الطلبة المسندين إليك مع روابط سريعة لجدولهم وسجلهم وخطط التسجيل</p>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div class="small text-muted">
          يمكنك من هنا الوصول لجدول كل طالب، كشف درجاته، وخطط التسجيل الخاصة به.
        </div>
        <div id="roleWarning" class="text-danger small d-none">
          هذه الصفحة مخصصة للمشرفين الأكاديميين فقط.
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h2 class="h6 mb-3">الطلبة تحت إشرافك</h2>
        <div id="msgBox" class="mb-2"></div>
        <div class="row g-2 mb-2">
          <div class="col-md-4">
            <input id="searchStudent" class="form-control form-control-sm" placeholder="بحث بالاسم أو الرقم">
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-striped align-middle" id="studentsTable">
            <thead>
              <tr>
                <th style="width:15%;">الرقم الدراسي</th>
                <th>اسم الطالب</th>
                <th style="width:30%;">إجراءات</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/js/common.js"></script>
  <script>
    let SUP_STUDENTS = [];

    function showMsg(text, type = 'info') {
      const box = document.getElementById('msgBox');
      box.innerHTML = text
        ? `<div class="alert alert-${type} py-1 px-2 mb-0">${text}</div>`
        : '';
    }

    function renderStudents() {
      const tbody = document.querySelector('#studentsTable tbody');
      const searchVal = (document.getElementById('searchStudent').value || '').toLowerCase();
      tbody.innerHTML = '';
      const filtered = SUP_STUDENTS.filter(st => {
        const text = ((st.student_id || '') + ' ' + (st.student_name || '')).toLowerCase();
        return !searchVal || text.includes(searchVal);
      });
      if (!filtered.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="3" class="text-muted text-center">لا توجد طلبة مسندين إليك حالياً.</td>`;
        tbody.appendChild(tr);
        return;
      }
      filtered.forEach(st => {
        const sid = st.student_id || '';
        const name = st.student_name || '';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="mono">${sid}</td>
          <td>${name}</td>
          <td>
            <div class="btn-group btn-group-sm" role="group">
              <a href="/student_view/${encodeURIComponent(sid)}" class="btn btn-outline-primary" target="_blank">جدول الطالب</a>
              <a href="/transcript_page" class="btn btn-outline-secondary btn-open-transcript" data-sid="${sid}" target="_blank">كشف الدرجات</a>
              <a href="/enrollment_plans" class="btn btn-outline-success btn-open-plans" data-sid="${sid}" target="_blank">خطط التسجيل</a>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function loadSupervisedStudents() {
      try {
        const data = await apiGet('/instructors/supervised_students');
        SUP_STUDENTS = data.students || [];
        renderStudents();
        showMsg(`تم تحميل ${SUP_STUDENTS.length} طالب/ـة تحت إشرافك.`, 'info');
      } catch (e) {
        console.error(e);
        showMsg('فشل تحميل قائمة الطلبة المسندين إليك', 'danger');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const auth = await apiGet('/auth/check');
        const role = auth.role || null;
        const isSupervisor = (role === 'supervisor') || (role === 'instructor' && Number(auth.is_supervisor || 0) === 1);
        if (!isSupervisor) {
          const warn = document.getElementById('roleWarning');
          if (warn) warn.classList.remove('d-none');
          showMsg('هذه الصفحة مخصصة للمشرفين الأكاديميين فقط.', 'danger');
          return;
        }
      } catch (e) {
        console.error(e);
        showMsg('تعذر التحقق من صلاحيات المستخدم', 'danger');
        return;
      }

      await loadSupervisedStudents();

      document.getElementById('searchStudent').addEventListener('input', debounce(() => {
        renderStudents();
      }, 250));

      // تحسين: يمكن في المستقبل تمرير student_id للصفحات الأخرى عبر query params أو تخزين محلي
      document.getElementById('studentsTable').addEventListener('click', (ev) => {
        const transcriptBtn = ev.target.closest('.btn-open-transcript');
        const plansBtn = ev.target.closest('.btn-open-plans');
        if (transcriptBtn) {
          const sid = transcriptBtn.dataset.sid;
          // فتح transcript_page مع تحديد الطالب تلقائياً من خلال localStorage
          try {
            localStorage.setItem('transcript_selected_student', sid);
          } catch(e) {}
        }
        if (plansBtn) {
          const sid = plansBtn.dataset.sid;
          try {
            localStorage.setItem('plans_selected_student', sid);
          } catch(e) {}
        }
      });
    });
  </script>
</body>
</html>
