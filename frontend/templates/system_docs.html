<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <style>

      border-radius: .5rem;
      padding: .9rem;

      overflow: auto;

<body>

    <div class="card mb-3">
      <div class="card-body">
        <h5 class="mb-2">PROJECT OVERVIEW</h5>
        <div class="doc-block">{{ overview_text }}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h5 class="mb-2">RUNBOOK</h5>
