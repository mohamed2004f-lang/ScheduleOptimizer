<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>إدخال بيانات الطلبة</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <!-- width is controlled via container-1100 -->
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main container-1100">

      <div class="page-header">
        <div>
          <h1 class="page-title">إدخال بيانات الطلبة</h1>
          <p class="page-subtitle">إضافة/تعديل بيانات الطلبة واستيرادها وتصديرها</p>
        </div>
      </div>

      <!-- أدوات الاستيراد والتصدير -->
      <div class="card mb-3">
        <div class="card-body">
          <div class="d-flex flex-wrap align-items-center justify-content-between">
            <div class="btn-group-gap">
              <a class="btn btn-outline-success btn-sm" href="/students/export/excel">⬇️ تصدير Excel</a>
              <a class="btn btn-outline-danger btn-sm" href="/students/export/pdf" target="_blank">⬇️ تصدير PDF</a>
            </div>
            <form id="students-import-form" class="d-flex align-items-center" enctype="multipart/form-data" onsubmit="return false;">
              <label class="form-label mb-0 me-2">📂 استيراد طلاب (Excel):</label>
              <input class="form-control form-control-sm" style="max-width: 280px;" type="file" name="file" accept=".xlsx,.xls" />
              <button type="button" class="btn btn-primary btn-sm ms-2" onclick="importStudents()">استيراد</button>
            </form>
          </div>
          <div id="import_msg" class="mt-2"></div>
        </div>
      </div>

      <!-- نموذج إضافة طالب -->
      <div class="card mb-3">
        <div class="card-body">
          <form id="studentForm" onsubmit="return false;">
            <div class="row g-2 align-items-end">
              <div class="col-md-4">
                <label class="form-label">الرقم الدراسي</label>
                <input id="student_id" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">اسم الطالب</label>
                <input id="student_name" class="form-control">
              </div>
              <div class="col-md-2">
                <button id="btnAddStudent" class="btn btn-primary w-100" type="button">أضف</button>
              </div>
            </div>
          </form>
          <div id="st_msg" class="mt-2"></div>
        </div>
      </div>

      <!-- قائمة الطلبة -->
      <div class="card">
        <div class="card-body">
          <h6>قائمة الطلبة</h6>
          <div id="studentsList" class="small mono"></div>
          <div class="mt-3">
            <a href="/" class="btn btn-outline-secondary btn-sm">العودة</a>
            <a href="/registrations_form" class="btn btn-primary btn-sm ms-2">تسجيل مواد الطلبة</a>
          </div>
        </div>
      </div>
    <!-- Edit student modal -->
    <div class="modal fade" id="editStudentModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h6 class="modal-title">تعديل بيانات الطالب</h6>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="إغلاق"></button>
          </div>
          <div class="modal-body">
            <div class="mb-2">
              <label class="form-label">الرقم الدراسي</label>
              <input id="es_student_id" class="form-control" disabled>
              <div class="form-text small">الرقم لا يمكن تغييره. الواجهة تستخدم upsert عبر /add_student.</div>
            </div>
            <div class="mb-2">
              <label class="form-label">اسم الطالب</label>
              <input id="es_student_name" class="form-control">
            </div>
            <div id="es_msg" class="mt-2"></div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">إلغاء</button>
            <button class="btn btn-primary btn-sm" id="esSaveBtn">حفظ</button>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script>
  /* تحميل وعرض الطلبة */
  async function loadStudents(){
    try {
      const r = await fetch('/list_students');
      const arr = r.ok ? await r.json() : [];
      const el = document.getElementById('studentsList');
      if(!arr.length){ el.textContent = 'لا يوجد طلاب مسجلين.'; return; }
      el.innerHTML = '';
      const ul = document.createElement('ul');
      ul.className = 'mb-0 list-unstyled';
      arr.forEach(s => {
        const li = document.createElement('li');
        li.className = 'py-1 d-flex align-items-center';
        const span = document.createElement('span');
        span.className = 'flex-grow-1';
        span.textContent = `${s.student_id} — ${s.student_name || ''}`;
        // Buttons: Edit + Delete
        const btnGroup = document.createElement('div');

        const editBtn = document.createElement('button');
        editBtn.className = 'btn btn-sm btn-outline-primary me-1';
        editBtn.type = 'button';
        editBtn.textContent = 'تعديل';
        editBtn.addEventListener('click', () => openEditStudent(s));

        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-sm btn-danger';
        delBtn.type = 'button';
        delBtn.textContent = 'حذف';
        delBtn.addEventListener('click', () => deleteStudent(s.student_id));

        btnGroup.appendChild(editBtn);
        btnGroup.appendChild(delBtn);

        li.appendChild(span);
        li.appendChild(btnGroup);
        ul.appendChild(li);
      });
      el.appendChild(ul);
    } catch (err) {
      console.error(err);
      document.getElementById('studentsList').textContent = 'حدث خطأ أثناء جلب الطلبة.';
    }
  }

  /* فتح نافذة تعديل طالب */
  function openEditStudent(student){
    try{
      const sidInput = document.getElementById('es_student_id');
      const nameInput = document.getElementById('es_student_name');
      const msgEl = document.getElementById('es_msg');
      if(msgEl) msgEl.innerHTML = '';
      if(sidInput) sidInput.value = student.student_id || '';
      if(nameInput) nameInput.value = student.student_name || '';
      const modalEl = document.getElementById('editStudentModal');
      if(modalEl){
        let modal = bootstrap.Modal.getInstance(modalEl);
        if(!modal) modal = new bootstrap.Modal(modalEl);
        modal.show();
      }
    } catch(e){
      console.error('openEditStudent error', e);
      alert('تعذّر فتح نافذة تعديل الطالب.');
    }
  }

  /* حذف طالب */
  async function deleteStudent(sid){
    if(!confirm('هل تريد حذف الطالب ' + sid + ' ؟')) return;
    try {
      const resp = await fetch('/delete_student', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({student_id: sid})
      });
      const j = await resp.json().catch(()=>null);
      alert(j?.message || (resp.ok ? 'تم' : 'خطأ'));
      await loadStudents();
    } catch (err) {
      console.error(err);
      alert('خطأ بالاتصال بالخادم.');
    }
  }

  /* إضافة طالب */
  document.addEventListener('DOMContentLoaded', function(){
    const addBtn = document.getElementById('btnAddStudent');
    if (addBtn) {
      addBtn.addEventListener('click', async () => {
        const sid = document.getElementById('student_id').value.trim();
        const name = document.getElementById('student_name').value.trim();
        if(!sid){
          document.getElementById('st_msg').innerHTML = '<div class="alert alert-warning p-1">أدخل الرقم الدراسي</div>';
          return;
        }
        try {
          const resp = await fetch('/add_student',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({student_id:sid,student_name:name})});
          const j = await resp.json();
          document.getElementById('st_msg').innerHTML = `<div class="alert ${resp.ok? 'alert-success':'alert-danger'} p-1">${j.message||j.status}</div>`;
          if(resp.ok){
            document.getElementById('student_id').value='';
            document.getElementById('student_name').value='';
            await loadStudents();
          }
        } catch (err) {
          console.error(err);
          document.getElementById('st_msg').innerHTML = '<div class="alert alert-danger p-1">خطأ في الاتصال بالخادم.</div>';
        }
      });
    }

    const esSaveBtn = document.getElementById('esSaveBtn');
    if (esSaveBtn) {
      esSaveBtn.addEventListener('click', async () => {
        const sid = document.getElementById('es_student_id').value.trim();
        const name = document.getElementById('es_student_name').value.trim();
        if(!sid){
          document.getElementById('es_msg').innerHTML = '<div class="alert alert-warning p-1">الرقم الدراسي مفقود</div>';
          return;
        }
        try {
          const resp = await fetch('/add_student', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({student_id: sid, student_name: name})
          });
          const j = await resp.json().catch(()=>null);
          if(resp.ok){
            document.getElementById('es_msg').innerHTML = '<div class="alert alert-success p-1">تم حفظ التعديل</div>';
            setTimeout(()=> {
              const modalEl = document.getElementById('editStudentModal');
              const modal = bootstrap.Modal.getInstance(modalEl);
              if(modal) modal.hide();
              loadStudents();
            }, 700);
          } else {
            document.getElementById('es_msg').innerHTML = `<div class="alert alert-danger p-1">${j?.message || resp.statusText || 'خطأ'}</div>`;
          }
        } catch (err) {
          console.error(err);
          document.getElementById('es_msg').innerHTML = '<div class="alert alert-danger p-1">خطأ في الاتصال بالخادم.</div>';
        }
      });
    }

    // استدعاء تحميل الطلبة عند التحميل
    loadStudents();
  });

  /* استيراد الطلبة من Excel */
  async function importStudents(){
    const form = document.getElementById('students-import-form');
    const fileInput = form.querySelector('input[type="file"]');
    const msg = document.getElementById('import_msg');
    msg.innerHTML = '';
    if(!fileInput.files || !fileInput.files.length){
      msg.innerHTML = '<div class="alert alert-warning p-1">الرجاء اختيار ملف Excel أولاً.</div>';
      return;
    }
    try {
      const data = new FormData(form);
      const res = await fetch('/students/import/excel', { method:'POST', body: data });
      const j = await res.json();
      if(res.ok){
        msg.innerHTML = `<div class="alert alert-success p-1">تم استيراد ${j.imported} سجل</div>`;
        await loadStudents();
        form.reset();
      } else {
        msg.innerHTML = `<div class="alert alert-danger p-1">خطأ: ${j.message || 'فشل الاستيراد'}</div>`;
      }
    } catch (err) {
      console.error(err);
      msg.innerHTML = '<div class="alert alert-danger p-1">خطأ في الاتصال بالخادم أثناء الاستيراد.</div>';
    }
  }
  </script>

  <!-- Bootstrap JS for modal -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
