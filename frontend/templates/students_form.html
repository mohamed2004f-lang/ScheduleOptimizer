<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>إدخال بيانات الطلبة</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <!-- width is controlled via container-1100 -->
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main container-1100">

      <div class="page-header">
        <div>
          <h1 class="page-title">إدخال بيانات الطلبة</h1>
          <p class="page-subtitle">إضافة/تعديل بيانات الطلبة واستيرادها وتصديرها</p>
        </div>
      </div>

      <!-- أدوات الاستيراد والتصدير -->
      <div class="card mb-3 filter-section">
        <div class="card-body p-2">
          <div class="d-flex flex-wrap align-items-center justify-content-between">
            <div class="btn-group-gap">
              <a class="btn btn-outline-success btn-sm" id="stExportExcel" href="/students/export/excel">⬇️ تصدير Excel</a>
              <a class="btn btn-outline-danger btn-sm" id="stExportPdf" href="/students/export/pdf" target="_blank">⬇️ تصدير PDF (رسمي)</a>
            </div>
            <form id="students-import-form" class="d-flex align-items-center" enctype="multipart/form-data" onsubmit="return false;">
              <label class="form-label mb-0 me-2">📂 استيراد طلاب (Excel):</label>
              <input class="form-control form-control-sm" style="max-width: 280px;" type="file" name="file" accept=".xlsx,.xls" />
              <button type="button" class="btn btn-primary btn-sm ms-2" onclick="importStudents()">استيراد</button>
            </form>
          </div>
          <div id="import_msg" class="mt-2"></div>
        </div>
      </div>

      <!-- نموذج إضافة طالب -->
      <div class="card mb-3 chart-container">
        <div class="card-body">
          <form id="studentForm" onsubmit="return false;">
            <div class="row g-2 align-items-end">
              <div class="col-md-3">
                <label class="form-label">الرقم الدراسي</label>
                <input id="student_id" class="form-control" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">اسم الطالب</label>
                <input id="student_name" class="form-control">
              </div>
              <div class="col-md-3">
                <label class="form-label">خطة التخرج</label>
                <select id="student_graduation_plan" class="form-select">
                  <option value="">— غير محدد —</option>
                  <option value="150">150 وحدة (نظام قديم)</option>
                  <option value="155">155 وحدة (نظام جديد)</option>
                </select>
              </div>
              <div class="col-md-2">
                <button id="btnAddStudent" class="btn btn-primary w-100" type="button">أضف</button>
              </div>
            </div>
            <div class="row g-2 align-items-end mt-2">
              <div class="col-md-3">
                <label class="form-label">فصل الالتحاق</label>
                <select id="student_join_term" class="form-select">
                  <option value="">— غير محدد —</option>
                  <option value="ربيع">ربيع</option>
                  <option value="خريف">خريف</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">سنة الالتحاق</label>
                <input id="student_join_year" class="form-control" type="text" placeholder="مثال: 2023" maxlength="20">
              </div>
            </div>
          </form>
          <div id="st_msg" class="mt-2"></div>
        </div>
      </div>

      <!-- قائمة الطلبة -->
      <div class="card chart-container">
        <div class="card-body">
          <h6>قائمة الطلبة</h6>
          <div class="row g-2 align-items-end mb-2">
            <div class="col-md-3">
              <label class="form-label small mb-0">من يُعرض في القائمة</label>
              <select id="filter_list_scope" class="form-select form-select-sm" title="فلترة حسب حالة القيد؛ التصدير يطابق نفس الفلتر">
                <option value="all" selected>الكل — كل حالات القيد</option>
                <option value="active_only">مسجّلون فقط</option>
                <option value="suspended">موقوفو القيد فقط</option>
                <option value="withdrawn">سحب الملف فقط</option>
                <option value="graduated">خريجون فقط</option>
              </select>
            </div>
            <div class="col-auto">
              <label class="form-label small mb-0">فلترة حسب الالتحاق</label>
            </div>
            <div class="col-md-2">
              <select id="filter_join_term" class="form-select form-select-sm">
                <option value="">كل الفصول</option>
                <option value="ربيع">ربيع</option>
                <option value="خريف">خريف</option>
              </select>
            </div>
            <div class="col-md-2">
              <input id="filter_join_year" class="form-control form-control-sm" type="text" placeholder="سنة الالتحاق">
            </div>
            <div class="col-auto">
              <button type="button" class="btn btn-outline-secondary btn-sm" id="btnApplyFilter">تطبيق</button>
            </div>
          </div>
          <div id="studentsList" class="small mono"></div>
          <div class="mt-3">
            <a href="/" class="btn btn-outline-secondary btn-sm">العودة</a>
            <a href="/registrations_form" class="btn btn-primary btn-sm ms-2">تسجيل مواد الطلبة</a>
          </div>
        </div>
      </div>
      <!-- نافذة تغيير حالة القيد -->
      <div class="modal fade" id="statusStudentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h6 class="modal-title">تغيير حالة قيد الطالب</h6>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="إغلاق"></button>
            </div>
            <div class="modal-body">
              <div class="mb-2">
                <label class="form-label">الطالب</label>
                <input id="st_status_student_id" class="form-control mb-1" disabled>
                <input id="st_status_student_name" class="form-control" disabled>
              </div>
              <div class="mb-2">
                <label class="form-label">حالة القيد</label>
                <select id="st_status_select" class="form-select">
                  <option value="active">مسجَّل</option>
                  <option value="withdrawn">سحب الملف</option>
                  <option value="suspended">موقوف قيده</option>
                  <option value="graduated">خريج</option>
                </select>
              </div>
              <div class="mb-2" id="st_status_phone_wrap" style="display: none;">
                <label class="form-label">رقم الهاتف (اختياري - للخريجين)</label>
                <input type="text" id="st_status_phone" class="form-control" placeholder="مثال: 05xxxxxxxx">
              </div>
              <div class="mb-2" id="st_status_term_wrap" style="display: none;">
                <label class="form-label">فصل وسنة الإجراء (مطلوب لسحب الملف وإيقاف القيد)</label>
                <div class="row g-2">
                  <div class="col-sm-6">
                    <select id="st_status_action_term" class="form-select">
                      <option value="">— الفصل —</option>
                      <option value="خريف">خريف</option>
                      <option value="ربيع">ربيع</option>
                      <option value="صيف">صيف</option>
                    </select>
                  </div>
                  <div class="col-sm-6">
                    <input type="text" id="st_status_action_year" class="form-control" placeholder="مثال: 2025" maxlength="20">
                  </div>
                </div>
                <button type="button" class="btn btn-link btn-sm px-0 mt-1" id="st_status_use_current_term">استخدام الفصل الحالي من الإعدادات</button>
              </div>
              <div class="mb-2">
                <label class="form-label">ملاحظة (اختياري)</label>
                <textarea id="st_status_reason" class="form-control" rows="2" placeholder="مثال: سحب الملف بناءً على طلب ولي الأمر بتاريخ ..."></textarea>
              </div>
              <div id="st_status_msg" class="mt-2"></div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">إلغاء</button>
              <button class="btn btn-primary btn-sm" id="stStatusSaveBtn">حفظ حالة القيد</button>
            </div>
          </div>
        </div>
      </div>
    <!-- Edit student modal -->
    <div class="modal fade" id="editStudentModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h6 class="modal-title">تعديل بيانات الطالب</h6>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="إغلاق"></button>
          </div>
          <div class="modal-body">
            <div class="mb-2">
              <label class="form-label">الرقم الدراسي</label>
              <input id="es_student_id" class="form-control" disabled>
              <div class="form-text small">الرقم لا يمكن تغييره. الواجهة تستخدم upsert عبر /add_student.</div>
            </div>
            <div class="mb-2">
              <label class="form-label">اسم الطالب</label>
              <input id="es_student_name" class="form-control">
            </div>
            <div class="mb-2">
              <label class="form-label">خطة التخرج</label>
              <select id="es_graduation_plan" class="form-select">
                <option value="">— غير محدد —</option>
                <option value="150">150 وحدة (نظام قديم)</option>
                <option value="155">155 وحدة (نظام جديد)</option>
              </select>
            </div>
            <div class="mb-2">
              <label class="form-label">فصل الالتحاق</label>
              <select id="es_join_term" class="form-select">
                <option value="">— غير محدد —</option>
                <option value="ربيع">ربيع</option>
                <option value="خريف">خريف</option>
              </select>
            </div>
            <div class="mb-2">
              <label class="form-label">سنة الالتحاق</label>
              <input id="es_join_year" class="form-control" type="text" placeholder="مثال: 2023" maxlength="20">
            </div>
            <div id="es_msg" class="mt-2"></div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">إلغاء</button>
            <button class="btn btn-primary btn-sm" id="esSaveBtn">حفظ</button>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script>
  function buildStudentsQueryParams() {
    const scopeEl = document.getElementById('filter_list_scope');
    const scope = scopeEl ? scopeEl.value : 'all';
    const joinTerm = (document.getElementById('filter_join_term')||{}).value || '';
    const joinYear = (document.getElementById('filter_join_year')||{}).value || '';
    const params = new URLSearchParams();
    if (scope === 'active_only') params.set('active_only', '1');
    else if (['suspended', 'withdrawn', 'graduated'].includes(scope)) params.set('enrollment_status', scope);
    if (joinTerm) params.set('join_term', joinTerm);
    if (joinYear) params.set('join_year', joinYear);
    return params;
  }

  function updateExportLinks() {
    const q = buildStudentsQueryParams().toString();
    const suf = q ? ('?' + q) : '';
    const ex = document.getElementById('stExportExcel');
    const pdf = document.getElementById('stExportPdf');
    if (ex) ex.href = '/students/export/excel' + suf;
    if (pdf) pdf.href = '/students/export/pdf' + suf;
  }

  /* تحميل وعرض الطلبة */
  async function loadStudents(){
    try {
      updateExportLinks();
      const params = buildStudentsQueryParams();
      let url = '/students/list';
      const q = params.toString();
      if (q) url += '?' + q;
      const r = await fetch(url);
      const arr = r.ok ? await r.json() : [];
      const el = document.getElementById('studentsList');
      if(!arr.length){ el.textContent = 'لا يوجد طلاب مطابقون للفلتر.'; return; }
      el.innerHTML = '';
      const ul = document.createElement('ul');
      ul.className = 'mb-0 list-unstyled';
      arr.forEach(s => {
        const li = document.createElement('li');
        li.className = 'py-1 d-flex align-items-center';
        const span = document.createElement('span');
        span.className = 'flex-grow-1';
        const status = s.enrollment_status || 'active';
        const statusMap = {
          'active': { label: 'مسجَّل', cls: 'bg-success-subtle text-success' },
          'withdrawn': { label: 'سحب الملف', cls: 'bg-secondary text-white' },
          'suspended': { label: 'موقوف قيده', cls: 'bg-warning text-dark' },
          'graduated': { label: 'خريج', cls: 'bg-info text-dark' },
        };
        const stInfo = statusMap[status] || statusMap['active'];
        span.textContent = `${s.student_id} — ${s.student_name || ''} `;
        const badge = document.createElement('span');
        badge.className = `badge rounded-pill ms-1 ${stInfo.cls}`;
        badge.textContent = stInfo.label;
        span.appendChild(badge);
        const plan = (s.graduation_plan || '').trim();
        if (plan) {
          const planBadge = document.createElement('span');
          planBadge.className = 'badge rounded-pill ms-1 bg-secondary';
          planBadge.textContent = plan === '150' ? '150 وحدة' : plan === '155' ? '155 وحدة' : plan;
          span.appendChild(planBadge);
        }
        const jTerm = (s.join_term || '').trim();
        const jYear = (s.join_year || '').trim();
        if (jTerm || jYear) {
          const joinBadge = document.createElement('span');
          joinBadge.className = 'badge rounded-pill ms-1 bg-info text-dark';
          joinBadge.textContent = [jTerm, jYear].filter(Boolean).join(' ');
          span.appendChild(joinBadge);
        }
        // Buttons: Edit + Delete
        const btnGroup = document.createElement('div');

        const editBtn = document.createElement('button');
        editBtn.className = 'btn btn-sm btn-outline-primary me-1';
        editBtn.type = 'button';
        editBtn.textContent = 'تعديل';
        editBtn.addEventListener('click', () => openEditStudent(s));

        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-sm btn-danger me-1';
        delBtn.type = 'button';
        delBtn.textContent = 'حذف';
        delBtn.addEventListener('click', () => deleteStudent(s.student_id));

        const statusBtn = document.createElement('button');
        statusBtn.className = 'btn btn-sm btn-outline-secondary';
        statusBtn.type = 'button';
        statusBtn.textContent = 'حالة القيد';
        statusBtn.addEventListener('click', () => openStatusStudent(s));

        btnGroup.appendChild(editBtn);
        btnGroup.appendChild(delBtn);
        btnGroup.appendChild(statusBtn);

        li.appendChild(span);
        li.appendChild(btnGroup);
        ul.appendChild(li);
      });
      el.appendChild(ul);
    } catch (err) {
      console.error(err);
      document.getElementById('studentsList').textContent = 'حدث خطأ أثناء جلب الطلبة.';
    }
  }

  /* فتح نافذة تعديل طالب */
  function openEditStudent(student){
    try{
      const sidInput = document.getElementById('es_student_id');
      const nameInput = document.getElementById('es_student_name');
      const planSelect = document.getElementById('es_graduation_plan');
      const joinTermSelect = document.getElementById('es_join_term');
      const joinYearInput = document.getElementById('es_join_year');
      const msgEl = document.getElementById('es_msg');
      if(msgEl) msgEl.innerHTML = '';
      if(sidInput) sidInput.value = student.student_id || '';
      if(nameInput) nameInput.value = student.student_name || '';
      if(planSelect) planSelect.value = (student.graduation_plan || '').trim() || '';
      if(joinTermSelect) joinTermSelect.value = (student.join_term || '').trim() || '';
      if(joinYearInput) joinYearInput.value = (student.join_year || '').trim() || '';
      const modalEl = document.getElementById('editStudentModal');
      if(modalEl){
        let modal = bootstrap.Modal.getInstance(modalEl);
        if(!modal) modal = new bootstrap.Modal(modalEl);
        modal.show();
      }
    } catch(e){
      console.error('openEditStudent error', e);
      alert('تعذّر فتح نافذة تعديل الطالب.');
    }
  }

  function syncStatusTermVisibility(){
    const statusSelect = document.getElementById('st_status_select');
    const wrap = document.getElementById('st_status_term_wrap');
    if(!wrap || !statusSelect) return;
    const v = statusSelect.value;
    wrap.style.display = (v === 'withdrawn' || v === 'suspended') ? 'block' : 'none';
  }

  /* فتح نافذة حالة القيد لطالب */
  function openStatusStudent(student){
    try{
      const idInput = document.getElementById('st_status_student_id');
      const nameInput = document.getElementById('st_status_student_name');
      const statusSelect = document.getElementById('st_status_select');
      const reasonInput = document.getElementById('st_status_reason');
      const termSel = document.getElementById('st_status_action_term');
      const yearInp = document.getElementById('st_status_action_year');
      const msgEl = document.getElementById('st_status_msg');
      if(msgEl) msgEl.innerHTML = '';
      if(idInput) idInput.value = student.student_id || '';
      if(nameInput) nameInput.value = student.student_name || '';
      if(statusSelect) statusSelect.value = student.enrollment_status || 'active';
      if(reasonInput) reasonInput.value = student.status_reason || '';
      if(termSel) termSel.value = student.status_changed_term || '';
      if(yearInp) yearInp.value = student.status_changed_year || '';
      const phoneWrap = document.getElementById('st_status_phone_wrap');
      const phoneInput = document.getElementById('st_status_phone');
      if(phoneWrap) phoneWrap.style.display = (statusSelect && statusSelect.value === 'graduated') ? 'block' : 'none';
      if(phoneInput) phoneInput.value = '';
      syncStatusTermVisibility();
      const modalEl = document.getElementById('statusStudentModal');
      if(modalEl){
        let modal = bootstrap.Modal.getInstance(modalEl);
        if(!modal) modal = new bootstrap.Modal(modalEl);
        modal.show();
      }
    } catch(e){
      console.error('openStatusStudent error', e);
      alert('تعذّر فتح نافذة حالة القيد للطالب.');
    }
  }

  /* حذف طالب */
  async function deleteStudent(sid){
    if(!confirm('هل تريد حذف الطالب ' + sid + ' ؟')) return;
    try {
      const resp = await fetch('/delete_student', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({student_id: sid})
      });
      const j = await resp.json().catch(()=>null);
      alert(j?.message || (resp.ok ? 'تم' : 'خطأ'));
      await loadStudents();
    } catch (err) {
      console.error(err);
      alert('خطأ بالاتصال بالخادم.');
    }
  }

  /* إضافة طالب */
  document.addEventListener('DOMContentLoaded', function(){
    const addBtn = document.getElementById('btnAddStudent');
    if (addBtn) {
      addBtn.addEventListener('click', async () => {
        const sid = document.getElementById('student_id').value.trim();
        const name = document.getElementById('student_name').value.trim();
        if(!sid){
          document.getElementById('st_msg').innerHTML = '<div class="alert alert-warning p-1">أدخل الرقم الدراسي</div>';
          return;
        }
        const plan = (document.getElementById('student_graduation_plan')||{}).value || '';
        const joinTerm = (document.getElementById('student_join_term')||{}).value || '';
        const joinYear = (document.getElementById('student_join_year')||{}).value || '';
        try {
          const resp = await fetch('/add_student',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({student_id:sid,student_name:name,graduation_plan:plan,join_term:joinTerm,join_year:joinYear})});
          const j = await resp.json();
          document.getElementById('st_msg').innerHTML = `<div class="alert ${resp.ok? 'alert-success':'alert-danger'} p-1">${j.message||j.status}</div>`;
          if(resp.ok){
            document.getElementById('student_id').value='';
            document.getElementById('student_name').value='';
            const planEl = document.getElementById('student_graduation_plan'); if(planEl) planEl.value='';
            const jt = document.getElementById('student_join_term'); if(jt) jt.value='';
            const jy = document.getElementById('student_join_year'); if(jy) jy.value='';
            await loadStudents();
          }
        } catch (err) {
          console.error(err);
          document.getElementById('st_msg').innerHTML = '<div class="alert alert-danger p-1">خطأ في الاتصال بالخادم.</div>';
        }
      });
    }

    const esSaveBtn = document.getElementById('esSaveBtn');
    if (esSaveBtn) {
      esSaveBtn.addEventListener('click', async () => {
        const sid = document.getElementById('es_student_id').value.trim();
        const name = document.getElementById('es_student_name').value.trim();
        if(!sid){
          document.getElementById('es_msg').innerHTML = '<div class="alert alert-warning p-1">الرقم الدراسي مفقود</div>';
          return;
        }
        const plan = (document.getElementById('es_graduation_plan')||{}).value || '';
        const joinTerm = (document.getElementById('es_join_term')||{}).value || '';
        const joinYear = (document.getElementById('es_join_year')||{}).value || '';
        try {
          const resp = await fetch('/add_student', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({student_id: sid, student_name: name, graduation_plan: plan, join_term: joinTerm, join_year: joinYear})
          });
          const j = await resp.json().catch(()=>null);
          if(resp.ok){
            document.getElementById('es_msg').innerHTML = '<div class="alert alert-success p-1">تم حفظ التعديل</div>';
            setTimeout(()=> {
              const modalEl = document.getElementById('editStudentModal');
              const modal = bootstrap.Modal.getInstance(modalEl);
              if(modal) modal.hide();
              loadStudents();
            }, 700);
          } else {
            document.getElementById('es_msg').innerHTML = `<div class="alert alert-danger p-1">${j?.message || resp.statusText || 'خطأ'}</div>`;
          }
        } catch (err) {
          console.error(err);
          document.getElementById('es_msg').innerHTML = '<div class="alert alert-danger p-1">خطأ في الاتصال بالخادم.</div>';
        }
      });
    }

    const btnApplyFilter = document.getElementById('btnApplyFilter');
    if (btnApplyFilter) btnApplyFilter.addEventListener('click', () => loadStudents());

    const filterScope = document.getElementById('filter_list_scope');
    if (filterScope) filterScope.addEventListener('change', () => { updateExportLinks(); loadStudents(); });

    const stStatusSelect = document.getElementById('st_status_select');
    if (stStatusSelect) {
      stStatusSelect.addEventListener('change', () => {
        const phoneWrap = document.getElementById('st_status_phone_wrap');
        if(phoneWrap) phoneWrap.style.display = stStatusSelect.value === 'graduated' ? 'block' : 'none';
        syncStatusTermVisibility();
      });
    }
    const useCurrTermBtn = document.getElementById('st_status_use_current_term');
    if (useCurrTermBtn) {
      useCurrTermBtn.addEventListener('click', async () => {
        try {
          const r = await fetch('/admin/settings/current_term');
          const j = await r.json().catch(() => null);
          if (!r.ok || !j) {
            alert('تعذّر قراءة الفصل الحالي من الإعدادات.');
            return;
          }
          const ts = document.getElementById('st_status_action_term');
          const yy = document.getElementById('st_status_action_year');
          if (j.term_name && ts) ts.value = j.term_name;
          if (j.term_year != null && yy) yy.value = String(j.term_year);
        } catch (e) {
          console.error(e);
          alert('خطأ بالاتصال عند جلب الفصل الحالي.');
        }
      });
    }
    const stStatusSaveBtn = document.getElementById('stStatusSaveBtn');
    if (stStatusSaveBtn) {
      stStatusSaveBtn.addEventListener('click', async () => {
        const sid = document.getElementById('st_status_student_id').value.trim();
        const status = document.getElementById('st_status_select').value;
        const reason = document.getElementById('st_status_reason').value.trim();
        const phone = (document.getElementById('st_status_phone') && document.getElementById('st_status_phone').value) ? document.getElementById('st_status_phone').value.trim() : '';
        const msgEl = document.getElementById('st_status_msg');
        if(!sid){
          if(msgEl) msgEl.innerHTML = '<div class="alert alert-warning p-1">الرقم الدراسي مفقود</div>';
          return;
        }
        try{
          const payload = { student_id: sid, enrollment_status: status, status_reason: reason };
          if (status === 'graduated') payload.phone = phone;
          if (status === 'withdrawn' || status === 'suspended') {
            const at = document.getElementById('st_status_action_term');
            const ay = document.getElementById('st_status_action_year');
            payload.status_changed_term = (at && at.value) ? at.value.trim() : '';
            payload.status_changed_year = (ay && ay.value) ? ay.value.trim() : '';
          }
          const resp = await fetch('/students/update_status', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
          });
          const j = await resp.json().catch(()=>null);
          if(resp.ok){
            if(msgEl) msgEl.innerHTML = `<div class="alert alert-success p-1">${(j && j.message) || 'تم حفظ حالة القيد'}</div>`;
            setTimeout(async () => {
              const modalEl = document.getElementById('statusStudentModal');
              const modal = bootstrap.Modal.getInstance(modalEl);
              if(modal) modal.hide();
              await loadStudents();
            }, 800);
          } else {
            if(msgEl) msgEl.innerHTML = `<div class="alert alert-danger p-1">${(j && j.message) || 'فشل حفظ حالة القيد'}</div>`;
          }
        } catch(err){
          console.error('update_status error', err);
          if(msgEl) msgEl.innerHTML = '<div class="alert alert-danger p-1">خطأ في الاتصال بالخادم.</div>';
        }
      });
    }

    updateExportLinks();
    // استدعاء تحميل الطلبة عند التحميل
    loadStudents();
  });

  /* استيراد الطلبة من Excel */
  async function importStudents(){
    const form = document.getElementById('students-import-form');
    const fileInput = form.querySelector('input[type="file"]');
    const msg = document.getElementById('import_msg');
    msg.innerHTML = '';
    if(!fileInput.files || !fileInput.files.length){
      msg.innerHTML = '<div class="alert alert-warning p-1">الرجاء اختيار ملف Excel أولاً.</div>';
      return;
    }
    try {
      const data = new FormData(form);
      const res = await fetch('/students/import/excel', { method:'POST', body: data });
      const j = await res.json();
      if(res.ok){
        msg.innerHTML = `<div class="alert alert-success p-1">تم استيراد ${j.imported} سجل</div>`;
        await loadStudents();
        form.reset();
      } else {
        msg.innerHTML = `<div class="alert alert-danger p-1">خطأ: ${j.message || 'فشل الاستيراد'}</div>`;
      }
    } catch (err) {
      console.error(err);
      msg.innerHTML = '<div class="alert alert-danger p-1">خطأ في الاتصال بالخادم أثناء الاستيراد.</div>';
    }
  }
  </script>

  <!-- Bootstrap JS for modal -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
