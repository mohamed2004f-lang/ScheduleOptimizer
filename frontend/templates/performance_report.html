<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تقرير أداء الطلبة</title>
  <link href="/static/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    @media print {
      body * {
        visibility: hidden;
      }
      main.container-main, main.container-main * {
        visibility: visible;
      }
      main.container-main {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
      nav.app-navbar, header.app-topbar, #msgBox, #statusFilter, #enrollmentFilter, #excludeInactive, #excludeNoGrades, #studentPick, #searchInput, #sortSelect, #btnPrint, #btnExport, #btnExportPdf, #btnExportDocx, #btnEditRules {
        display: none !important;
      }
    }
    /* تحسين ظهور زر الفرصة الاستثنائية داخل عمود ضيق */
    .btn-extra{
      white-space: normal;      /* السماح بتقسيم السطر للنص الطويل */
      width: 100%;              /* يجعل الزر بعرض العمود لسهولة القراءة */
      text-align: center;       /* توسيط النص داخل الزر */
    }
    /* تحسين ظهور حالة الطالب (النص قد يكون طويلاً جداً) */
    #perfTable td .badge{
      white-space: normal;      /* يسمح بالتفاف النص داخل الشارة */
      line-height: 1.2;
      display: inline-block;    /* يحافظ على الالتفاف داخل حدود الشارة */
      max-width: 240px;         /* يمنع تمدد الصف أفقياً بشكل مبالغ */
      text-align: center;
    }
    /* اجعل عمود "حالة الطالب" مرناً وواسعاً قدر الإمكان */
    #perfTable th:nth-child(10),
    #perfTable td:nth-child(10){
      min-width: 200px;
    }
  </style>
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main container-1100">
    <div class="page-header mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <h1 class="page-title">تقرير أداء الطلبة</h1>
        <p class="page-subtitle">عرض معدلات الفصول الأخيرة، المعدل التراكمي، الوحدات المنجزة، وحالة الإنذار الأكاديمي</p>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <button id="btnEditRules" class="btn btn-outline-info btn-sm" style="display:none;">
          تعديل لائحة الإنذارات والفصل
        </button>
      </div>
    </div>

    <div class="card mb-3 filter-section">
      <div class="card-body row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label">تصفية حسب الحالة</label>
          <select id="statusFilter" class="form-select form-select-sm">
            <option value="">كل الحالات</option>
            <option value="good">سليم أكاديمياً</option>
            <option value="warning_1">إنذار أول</option>
            <option value="warning_2">إنذار ثانٍ</option>
            <option value="warning_3">أكثر من إنذارين</option>
            <option value="no_data">لا توجد بيانات درجات</option>
            <option value="withdrawn">سحب ملف</option>
            <option value="suspended">إيقاف قيد</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">بحث بالاسم أو الرقم</label>
          <input id="searchInput" class="form-control form-control-sm" placeholder="اكتب جزءاً من الاسم أو الرقم">
        </div>
        <div class="col-md-3">
          <label class="form-label">فرز حسب</label>
          <select id="sortSelect" class="form-select form-select-sm">
            <option value="student_id">الرقم الدراسي</option>
            <option value="cumulative_gpa_desc">المعدل التراكمي (تنازلي)</option>
            <option value="last_gpa_desc">آخر معدل فصلي (تنازلي)</option>
            <option value="completed_units_desc">الوحدات المنجزة (تنازلي)</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">حالة القيد</label>
          <select id="enrollmentFilter" class="form-select form-select-sm">
            <option value="">كل حالات القيد</option>
            <option value="active">مسجّل</option>
            <option value="suspended">إيقاف قيد</option>
            <option value="withdrawn">سحب ملف</option>
            <option value="graduated">خريج</option>
          </select>
          <div class="form-check mt-1">
            <input class="form-check-input" type="checkbox" id="excludeInactive">
            <label class="form-check-label small" for="excludeInactive">استثناء الخريجين وسحب الملف</label>
          </div>
          <div class="form-check mt-1">
            <input class="form-check-input" type="checkbox" id="excludeNoGrades">
            <label class="form-check-label small" for="excludeNoGrades">استثناء من لم يُدخل كشف درجاته (لا فصول في السجل)</label>
          </div>
        </div>
        <div class="col-md-3">
          <label class="form-label">اختيار طلبة محددين (اختياري)</label>
          <select id="studentPick" class="form-select form-select-sm" multiple size="4" title="استخدم Ctrl لاختيار أكثر من طالب"></select>
        </div>
        <div class="col-md-12 text-end d-flex flex-column flex-md-row justify-content-md-end gap-2 mt-3 mt-md-0 flex-wrap">
          <button id="btnPrint" class="btn btn-outline-dark btn-sm">طباعة التقرير</button>
          <button id="btnExport" class="btn btn-outline-secondary btn-sm">تصدير Excel</button>
          <button id="btnExportPdf" class="btn btn-outline-danger btn-sm">تصدير PDF (رسمي)</button>
          <button id="btnExportDocx" class="btn btn-outline-primary btn-sm">تصدير Word (رسمي)</button>
        </div>
      </div>
    </div>

    <div class="card chart-container">
      <div class="card-body">
        <div id="msgBox" class="mb-2"></div>
        <div class="table-responsive">
          <table class="table table-sm table-striped align-middle" id="perfTable">
            <thead>
              <tr>
                <th>الرقم الدراسي</th>
                <th>اسم الطالب</th>
                <th>سنة الالتحاق</th>
                <th>حالة القيد</th>
                <th>فصل الإجراء</th>
                <th>الفصل الأخير (GPA)</th>
                <th>الفصل السابق (GPA)</th>
                <th>المعدل التراكمي</th>
                <th>الوحدات المنجزة</th>
                <th>حالة الطالب</th>
                <th>فرصة استثنائية</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/js/common.js"></script>
  <script>
    let RAW_STUDENTS = [];
    let CURRENT_ROLE = null;

    function showMsg(text, type = 'info') {
      const box = document.getElementById('msgBox');
      box.innerHTML = text ? `<div class="alert alert-${type} py-1 px-2 mb-0">${text}</div>` : '';
    }

    function formatGpa(val) {
      if (val === null || typeof val === 'undefined') return '—';
      const num = Number(val);
      if (!Number.isFinite(num)) return '—';
      return num.toFixed(2);
    }

    function enrollmentLabelAr(es) {
      const m = { active: 'مسجّل', withdrawn: 'سحب ملف', suspended: 'إيقاف قيد', graduated: 'خريج' };
      const k = (es || 'active').toString().trim().toLowerCase();
      return m[k] || es || '—';
    }

    function statusActionPeriodDisplay(r) {
      const t = (r.status_changed_term || '').trim();
      const y = (r.status_changed_year || '').trim();
      if (t && y) return `${t} — ${y}`;
      const one = t || y;
      return one || '—';
    }

    function getFilteredRows() {
      const statusFilter = document.getElementById('statusFilter').value;
      const enrollmentFilter = document.getElementById('enrollmentFilter').value;
      const excludeInactive = !!document.getElementById('excludeInactive')?.checked;
      const excludeNoGrades = !!document.getElementById('excludeNoGrades')?.checked;
      const selectedStudents = new Set(
        Array.from(document.getElementById('studentPick')?.selectedOptions || []).map(o => o.value)
      );
      const search = (document.getElementById('searchInput').value || '').toLowerCase();
      const sortBy = document.getElementById('sortSelect').value;

      let rows = RAW_STUDENTS.slice();

      if (statusFilter) {
        rows = rows.filter(r => r.status_code === statusFilter);
      }
      if (enrollmentFilter) {
        rows = rows.filter(r => (r.enrollment_status || 'active') === enrollmentFilter);
      }
      if (excludeInactive) {
        rows = rows.filter(r => !['graduated', 'withdrawn'].includes((r.enrollment_status || 'active')));
      }
      if (excludeNoGrades) {
        rows = rows.filter(r => r.status_code !== 'no_data');
      }
      if (selectedStudents.size) {
        rows = rows.filter(r => selectedStudents.has(r.student_id || ''));
      }

      if (search) {
        rows = rows.filter(r => {
          const txt = ((r.student_id || '') + ' ' + (r.student_name || '')).toLowerCase();
          return txt.includes(search);
        });
      }

      rows.sort((a, b) => {
        if (sortBy === 'cumulative_gpa_desc') {
          return (b.cumulative_gpa || 0) - (a.cumulative_gpa || 0);
        }
        if (sortBy === 'last_gpa_desc') {
          return (b.last_semester_gpa || 0) - (a.last_semester_gpa || 0);
        }
        if (sortBy === 'completed_units_desc') {
          return (b.completed_units || 0) - (a.completed_units || 0);
        }
        // default: student_id asc
        return (a.student_id || '').localeCompare(b.student_id || '');
      });
      return rows;
    }

    function renderTable() {
      const tbody = document.querySelector('#perfTable tbody');
      const rows = getFilteredRows();

      tbody.innerHTML = '';
      if (!rows.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="11" class="text-center text-muted">لا توجد بيانات مطابقة.</td>`;
        tbody.appendChild(tr);
        return;
      }

      rows.forEach(r => {
        const tr = document.createElement('tr');
        let badgeClass = 'secondary';
        if (r.status_code === 'good') badgeClass = 'success';
        else if (r.status_code === 'warning_1') badgeClass = 'warning';
        else if (r.status_code === 'warning_2') badgeClass = 'danger';
        else if (r.status_code === 'warning_3') badgeClass = 'dark';
        else if (r.status_code === 'suspended') badgeClass = 'danger';
        else if (r.status_code === 'withdrawn') badgeClass = 'secondary';
        else if (r.status_code === 'no_data') badgeClass = 'light text-dark';

        const lastLabel = r.last_semester
          ? `${r.last_semester} (${formatGpa(r.last_semester_gpa)})`
          : '—';
        const prevLabel = r.prev_semester
          ? `${r.prev_semester} (${formatGpa(r.prev_semester_gpa)})`
          : '—';

        const extraBadge = r.extra_chance
          ? `<span class="badge bg-info text-dark" title="${r.extra_chance_note || 'فرصة استثنائية سارية'}">فرصة استثنائية</span>`
          : '';

        let extraActions = '';
        if (CURRENT_ROLE === 'admin') {
          if (r.extra_chance) {
            extraActions = `
              <button type="button" class="btn btn-sm btn-outline-danger btn-extra" data-sid="${r.student_id}" data-active="0">
                إلغاء الفرصة
              </button>
            `;
          } else {
            extraActions = `
              <button type="button" class="btn btn-sm btn-outline-primary btn-extra" data-sid="${r.student_id}" data-active="1">
                منح فرصة استثنائية
              </button>
            `;
          }
        }

        tr.innerHTML = `
          <td class="mono">${r.student_id}</td>
          <td>${r.student_name || ''}</td>
          <td>${r.join_year || ''}</td>
          <td>${enrollmentLabelAr(r.enrollment_status)}</td>
          <td>${statusActionPeriodDisplay(r)}</td>
          <td>${lastLabel}</td>
          <td>${prevLabel}</td>
          <td>${formatGpa(r.cumulative_gpa)}</td>
          <td>${r.completed_units || 0}</td>
          <td><span class="badge bg-${badgeClass}">${r.status_label}</span></td>
          <td>
            <div class="d-flex flex-column gap-1">
              ${extraBadge}
              ${extraActions}
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });

      if (CURRENT_ROLE === 'admin') {
        document.querySelectorAll('.btn-extra').forEach(btn => {
          btn.addEventListener('click', async (ev) => {
            const sid = ev.currentTarget.dataset.sid;
            const active = ev.currentTarget.dataset.active === '1';
            const note = active ? prompt('أدخل ملاحظة عن الفرصة الاستثنائية (اختياري):', '') || '' : '';
            try {
              await apiPost('/performance/extra_chance', {
                student_id: sid,
                active,
                note,
              });
              showMsg('تم تحديث حالة الفرصة الاستثنائية للطالب ' + sid, 'success');
              await loadReport();
            } catch (e) {
              console.error(e);
              showMsg('فشل تحديث الفرصة الاستثنائية', 'danger');
            }
          });
        });
      }
    }

    function syncStudentPickOptions() {
      const select = document.getElementById('studentPick');
      if (!select) return;
      const selectedBefore = new Set(Array.from(select.selectedOptions).map(o => o.value));
      select.innerHTML = '';
      RAW_STUDENTS.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.student_id || '';
        opt.textContent = `${r.student_id || ''} — ${r.student_name || ''}`;
        if (selectedBefore.has(opt.value)) opt.selected = true;
        select.appendChild(opt);
      });
    }

    function buildExportUrl(format) {
      const params = new URLSearchParams();
      const statusFilter = document.getElementById('statusFilter').value;
      const enrollmentFilter = document.getElementById('enrollmentFilter').value;
      const excludeInactive = !!document.getElementById('excludeInactive')?.checked;
      const excludeNoGrades = !!document.getElementById('excludeNoGrades')?.checked;
      const selectedStudents = Array.from(document.getElementById('studentPick')?.selectedOptions || []).map(o => o.value).filter(Boolean);

      if (format && format !== 'xlsx') params.set('format', format);
      if (statusFilter) params.set('status_codes', statusFilter);
      if (enrollmentFilter) params.set('enrollment', enrollmentFilter);
      if (excludeInactive) params.set('exclude_enrollment', 'graduated,withdrawn');
      if (excludeNoGrades) params.set('exclude_status_codes', 'no_data');
      if (selectedStudents.length) params.set('student_ids', selectedStudents.join(','));

      const qs = params.toString();
      return '/performance/export' + (qs ? `?${qs}` : '');
    }

    async function loadReport() {
      showMsg('جارٍ تحميل تقرير الأداء...', 'info');
      try {
        const auth = await apiGet('/auth/check');
        CURRENT_ROLE = auth.role || null;
        if (CURRENT_ROLE === 'admin') {
          const btnEdit = document.getElementById('btnEditRules');
          if (btnEdit) btnEdit.style.display = 'inline-block';
        }
        const data = await apiGet('/performance/report');
        RAW_STUDENTS = Array.isArray(data.students) ? data.students : [];
        syncStudentPickOptions();
        showMsg(`تم تحميل بيانات ${RAW_STUDENTS.length} طالب/ـة.`, 'success');
        renderTable();
      } catch (e) {
        console.error(e);
        showMsg('فشل تحميل تقرير الأداء', 'danger');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadReport();
      document.getElementById('statusFilter').addEventListener('change', renderTable);
      document.getElementById('enrollmentFilter').addEventListener('change', renderTable);
      document.getElementById('excludeInactive').addEventListener('change', renderTable);
      document.getElementById('excludeNoGrades').addEventListener('change', renderTable);
      document.getElementById('studentPick').addEventListener('change', renderTable);
      document.getElementById('sortSelect').addEventListener('change', renderTable);
      document.getElementById('searchInput').addEventListener('input', debounce(renderTable, 200));
      const btnPrint = document.getElementById('btnPrint');
      if (btnPrint) {
        btnPrint.addEventListener('click', () => {
          window.print();
        });
      }
      const btnExport = document.getElementById('btnExport');
      if (btnExport) {
        btnExport.addEventListener('click', () => {
          window.open(buildExportUrl('xlsx'), '_blank');
        });
      }
      const btnPdf = document.getElementById('btnExportPdf');
      if (btnPdf) {
        btnPdf.addEventListener('click', () => {
          window.open(buildExportUrl('pdf'), '_blank');
        });
      }
      const btnDocx = document.getElementById('btnExportDocx');
      if (btnDocx) {
        btnDocx.addEventListener('click', () => {
          window.open(buildExportUrl('docx'), '_blank');
        });
      }
      const btnEdit = document.getElementById('btnEditRules');
      if (btnEdit) {
        btnEdit.addEventListener('click', () => {
          window.location.href = '/academic_rules_page';
        });
      }
    });
  </script>
</body>
</html>
