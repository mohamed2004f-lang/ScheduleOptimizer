<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ template.title_ar }}</title>
  <link href="/static/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container mt-4" style="max-width:720px;">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">{{ template.title_ar }}</h5>
        <small>تقييم سري — الفصل: {{ semester }}</small>
      </div>
      <div class="card-body">
        <form id="surveyForm">
          <input type="hidden" name="template_code" value="{{ template.code }}">
          <input type="hidden" name="semester" value="{{ semester }}">
          <input type="hidden" name="subject_type" value="{{ subject_type }}">
          <input type="hidden" name="subject_id" value="{{ subject_id }}">
          {% for q in questions %}
          <div class="mb-4">
            <label class="form-label fw-bold">{{ loop.index }}. {{ q.label_ar }}</label>
            <div class="btn-group w-100 flex-wrap" role="group">
              {% for v, t in likert_labels %}
              <input type="radio" class="btn-check" name="q_{{ q.id }}" value="{{ v }}" id="q{{ q.id }}_{{ v }}" required>
              <label class="btn btn-outline-secondary btn-sm" for="q{{ q.id }}_{{ v }}">{{ t }} ({{ v }})</label>
              {% endfor %}
            </div>
          </div>
          {% endfor %}
          <div class="mb-3">
            <label class="form-label">ملاحظات (اختياري)</label>
            <textarea class="form-control" name="comments" rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-success btn-lg w-100">إرسال</button>
          <a href="/academic_quality/surveys" class="btn btn-link w-100 mt-2">العودة إلى الاستبيانات</a>
        </form>
      </div>
    </div>
  </main>
  <script>
    document.getElementById('surveyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      const answers = {};
      for (const [k, v] of Object.entries(body)) {
        if (k.startsWith('q_')) answers[k.slice(2)] = v;
      }
      body.answers = answers;
      const r = await fetch('/academic_quality/surveys/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
        body: JSON.stringify(body),
      });
      const j = await r.json().catch(() => ({}));
      if (r.ok && j.status === 'ok') {
        window.location.href = '/academic_quality/surveys?done=1';
      } else {
        alert(j.message || 'تعذر الإرسال');
      }
    });
  </script>
</body>
</html>
