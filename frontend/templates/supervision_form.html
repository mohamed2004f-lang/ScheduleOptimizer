<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>إسناد الطلبة للمشرفين</title>
  <link href="/static/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main">
    <div class="page-header mb-3">
      <div>
        <h1 class="page-title">إسناد الطلبة للمشرفين</h1>
        <p class="page-subtitle">اختر عضو هيئة التدريس ثم حدّد الطلبة الذين يشرف عليهم</p>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-body row g-3 align-items-end">
        <div class="col-md-6">
          <label for="supervisorSelect" class="form-label">المشرف (عضو هيئة التدريس)</label>
          <select id="supervisorSelect" class="form-select">
            <option value="">-- اختر مشرفاً --</option>
          </select>
        </div>
        <div class="col-md-3">
          <label for="searchStudent" class="form-label">بحث في الطلبة</label>
          <input id="searchStudent" class="form-control" placeholder="ابحث بالاسم أو الرقم">
        </div>
        <div class="col-md-3 d-flex gap-2">
          <button type="button" id="btnSelectAll" class="btn btn-outline-secondary flex-grow-1">تحديد الكل في الصفحة</button>
          <button type="button" id="btnClearAll" class="btn btn-outline-secondary flex-grow-1">إلغاء الكل</button>
        </div>
        <div class="col-12">
          <div id="msgBox"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h2 class="h6 mb-3">قائمة الطلبة</h2>
        <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
          <table class="table table-sm table-striped align-middle" id="studentsTable">
            <thead>
              <tr>
                <th style="width:5%;"></th>
                <th style="width:20%;">الرقم الدراسي</th>
                <th>اسم الطالب</th>
                <th style="width:15%;">له مشرف حالياً؟</th>
              </tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
        <div class="mt-3 d-flex justify-content-between align-items-center">
          <span class="small text-muted" id="selectionSummary">لم يتم اختيار أي طالب بعد.</span>
          <button type="button" id="btnSaveAssignments" class="btn btn-primary">حفظ الإسنادات للمشرف المحدد</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/js/common.js"></script>
  <script>
    let ALL_STUDENTS = [];
    let CURRENT_SUPERVISED = new Set();

    function showMsg(text, type = 'info') {
      const box = document.getElementById('msgBox');
      box.innerHTML = `<div class="alert alert-${type} py-1 px-2 mb-0">${text}</div>`;
    }

    function updateSelectionSummary() {
      const tbody = document.querySelector('#studentsTable tbody');
      const checked = tbody.querySelectorAll('input[type="checkbox"][data-sid]:checked');
      const count = checked.length;
      const supSelect = document.getElementById('supervisorSelect');
      const supName = supSelect.options[supSelect.selectedIndex]?.text || '';
      const span = document.getElementById('selectionSummary');
      if (!supSelect.value) {
        span.textContent = 'اختر مشرفاً أولاً، ثم حدّد الطلبة.';
        return;
      }
      if (count === 0) {
        span.textContent = `لم يتم اختيار أي طالب للمشرف: ${supName}`;
      } else {
        span.textContent = `تم اختيار ${count} طالب/ـة للمشرف: ${supName}`;
      }
    }

    async function loadSupervisors() {
      try {
        const data = await apiGet('/instructors/list');
        const sel = document.getElementById('supervisorSelect');
        sel.innerHTML = '<option value="">-- اختر مشرفاً --</option>';
        (data.instructors || []).forEach(inst => {
          if (!inst.is_active) return;
          const opt = document.createElement('option');
          opt.value = inst.id;
          const typeLabel = inst.type === 'external' ? ' (متعاون)' : '';
          opt.text = (inst.name || '') + typeLabel;
          sel.appendChild(opt);
        });
      } catch (e) {
        console.error(e);
        showMsg('فشل تحميل قائمة المشرفين', 'danger');
      }
    }

    async function loadStudents() {
      try {
        const data = await apiGet('/instructors/available_students');
        ALL_STUDENTS = data.students || [];
        renderStudentsTable();
      } catch (e) {
        console.error(e);
        showMsg('فشل تحميل قائمة الطلبة', 'danger');
      }
    }

    function renderStudentsTable() {
      const tbody = document.querySelector('#studentsTable tbody');
      const searchVal = (document.getElementById('searchStudent').value || '').toLowerCase();
      tbody.innerHTML = '';
      ALL_STUDENTS.forEach(st => {
        const sid = st.student_id || '';
        const name = st.student_name || '';
        const hasSup = !!st.has_supervisor;
        const rowText = (sid + ' ' + name).toLowerCase();
        if (searchVal && !rowText.includes(searchVal)) return;
        const tr = document.createElement('tr');
        const isSelected = CURRENT_SUPERVISED.has(sid);
        tr.innerHTML = `
          <td>
            <input type="checkbox" data-sid="${sid}" ${isSelected ? 'checked' : ''}>
          </td>
          <td>${sid}</td>
          <td>${name}</td>
          <td>${hasSup ? '<span class="badge bg-success">نعم</span>' : '<span class="badge bg-secondary">لا</span>'}</td>
        `;
        tbody.appendChild(tr);
      });
      updateSelectionSummary();
    }

    async function loadSupervisedForSelectedInstructor() {
      const sel = document.getElementById('supervisorSelect');
      const instId = sel.value;
      CURRENT_SUPERVISED = new Set();
      if (!instId) {
        renderStudentsTable();
        return;
      }
      try {
        const data = await apiGet(`/instructors/supervised_students?instructor_id=${encodeURIComponent(instId)}`);
        const students = data.students || [];
        students.forEach(st => {
          if (st.student_id) CURRENT_SUPERVISED.add(st.student_id);
        });
        renderStudentsTable();
        showMsg(`تم تحميل ${students.length} طالب/ـة مسندين لهذا المشرف.`, 'info');
      } catch (e) {
        console.error(e);
        showMsg('فشل تحميل الطلبة المسندين للمشرف', 'danger');
      }
    }

    async function saveAssignments() {
      const sel = document.getElementById('supervisorSelect');
      const instId = sel.value;
      if (!instId) {
        showMsg('يرجى اختيار مشرف أولاً.', 'warning');
        return;
      }
      const btn = document.getElementById('btnSaveAssignments');
      const tbody = document.querySelector('#studentsTable tbody');
      const checked = tbody.querySelectorAll('input[type="checkbox"][data-sid]:checked');
      const studentIds = Array.from(checked).map(ch => ch.dataset.sid);
      try {
        setLoading('btnSaveAssignments', true, 'جاري الحفظ...');
        const data = await apiPost('/instructors/assign_students', {
          instructor_id: instId,
          student_ids: studentIds,
        });
        showMsg(`تم حفظ الإسنادات (${data.assigned_count} طالب/ـة).`, 'success');
        CURRENT_SUPERVISED = new Set(studentIds);
        updateSelectionSummary();
      } catch (e) {
        console.error(e);
        showMsg(e.message || 'فشل حفظ الإسنادات', 'danger');
      } finally {
        setLoading('btnSaveAssignments', false);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadSupervisors();
      loadStudents();

      document.getElementById('supervisorSelect').addEventListener('change', () => {
        loadSupervisedForSelectedInstructor();
      });

      document.getElementById('searchStudent').addEventListener('input', debounce(() => {
        renderStudentsTable();
      }, 250));

      document.getElementById('btnSelectAll').addEventListener('click', () => {
        const tbody = document.querySelector('#studentsTable tbody');
        tbody.querySelectorAll('input[type="checkbox"][data-sid]').forEach(ch => {
          ch.checked = true;
          CURRENT_SUPERVISED.add(ch.dataset.sid);
        });
        updateSelectionSummary();
      });

      document.getElementById('btnClearAll').addEventListener('click', () => {
        const tbody = document.querySelector('#studentsTable tbody');
        tbody.querySelectorAll('input[type="checkbox"][data-sid]').forEach(ch => {
          ch.checked = false;
        });
        CURRENT_SUPERVISED.clear();
        updateSelectionSummary();
      });

      document.getElementById('studentsTable').addEventListener('change', (ev) => {
        const ch = ev.target.closest('input[type="checkbox"][data-sid]');
        if (!ch) return;
        const sid = ch.dataset.sid;
        if (ch.checked) {
          CURRENT_SUPERVISED.add(sid);
        } else {
          CURRENT_SUPERVISED.delete(sid);
        }
        updateSelectionSummary();
      });

      document.getElementById('btnSaveAssignments').addEventListener('click', saveAssignments);
    });
  </script>
</body>
</html>
