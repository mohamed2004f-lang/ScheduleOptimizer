<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>التقويم الأكاديمي</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main container-1100 theme-formal">
    <div class="page-header">
      <div>
        <h1 class="page-title">التقويم الأكاديمي</h1>
        <p class="page-subtitle">تحديد تواريخ الخطة الدراسية للفصل الحالي والفصول الماضية حسب العام الجامعي</p>
      </div>
      <div class="d-flex gap-2">
        <a href="/" class="btn btn-outline-secondary btn-sm">العودة</a>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-md-4">
            <label class="form-label">العام الجامعي</label>
            <input id="academicYear" class="form-control form-control-sm" placeholder="مثال: 2025/2026" />
          </div>
          <div class="col-md-4">
            <label class="form-label">الفصل الدراسي</label>
            <select id="termSelect" class="form-select form-select-sm">
              <option value="fall">فصل الخريف</option>
              <option value="spring">فصل الربيع</option>
            </select>
          </div>
          <div class="col-md-4 d-flex gap-2">
            <button id="btnLoad" class="btn btn-outline-primary btn-sm w-100">تحميل</button>
            <button id="btnAddTitle" class="btn btn-outline-secondary btn-sm w-100">إضافة عنوان</button>
            <button id="btnSave" class="btn btn-primary btn-sm w-100">حفظ</button>
          </div>
        </div>
        <div id="msg" class="mt-2"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-sm table-bordered align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th style="width:70px" class="text-center">رقم</th>
                <th>العنوان حسب الخطة الدراسية</th>
                <th style="width:200px" class="text-center">
                  <div>التاريخ</div>
                  <div class="small text-muted">يُحدد حسب التقويم السنوي</div>
                  <div class="small text-muted" dir="ltr" style="direction:ltr">DD/MM/YYYY</div>
                </th>
              </tr>
            </thead>
            <tbody id="calendarBody"></tbody>
          </table>
        </div>
        <div class="small text-muted mt-2" id="lastUpdated"></div>
      </div>
    </div>
  </main>

  <script>
    async function fetchJSON(url, opts){ const r = await fetch(url, opts); const j = await r.json().catch(()=>null); return {ok:r.ok,status:r.status,json:j}; }
    function setMsg(kind, text){
      const el = document.getElementById('msg');
      el.innerHTML = text ? `<div class="alert alert-${kind} p-2 mb-0">${text}</div>` : '';
    }

    let CURRENT = { academic_year: null, term: null, items: [] };
    let CURRENT_ROLE = null;

    function guessAcademicYear(){
      const d = new Date();
      const y = d.getFullYear();
      const m = d.getMonth() + 1;
      // تقدير بسيط: إذا بعد سبتمبر نعتبر بداية عام جديد
      const start = (m >= 9) ? y : (y - 1);
      return `${start}/${start + 1}`;
    }

    function render(items){
      const body = document.getElementById('calendarBody');
      body.innerHTML = '';
      (items || []).forEach(it=>{
        const tr = document.createElement('tr');
        const titleCell = (CURRENT_ROLE === 'admin')
          ? `<input type="text" class="form-control form-control-sm cal-title" data-no="${it.item_no}" value="${(it.title || '').replace(/\"/g,'&quot;')}" />`
          : `<div>${it.title || ''}</div>`;
        const canEdit = (CURRENT_ROLE === 'admin');
        const btnDel = canEdit
          ? `<button type="button" class="btn btn-sm ${it.is_custom ? 'btn-outline-danger' : 'btn-outline-warning'} cal-del" data-no="${it.item_no}" data-custom="${it.is_custom ? '1':'0'}">حذف</button>`
          : '';
        tr.innerHTML = `
          <td class="text-center">${it.item_no}</td>
          <td>
            <div class="d-flex gap-2 align-items-center">
              <div class="flex-grow-1">${titleCell}</div>
              ${btnDel}
            </div>
          </td>
          <td class="text-center">
            <input type="date" class="form-control form-control-sm cal-date" dir="ltr" lang="en-GB" style="direction:ltr" data-no="${it.item_no}" value="${(it.event_date || '').substring(0,10)}" ${canEdit ? '' : 'disabled'} />
          </td>
        `;
        body.appendChild(tr);
      });

      if (CURRENT_ROLE === 'admin') {
        body.querySelectorAll('.cal-del').forEach(btn=>{
          btn.addEventListener('click', ()=>{
            // "حذف" هنا يعني إخفاء العنصر من هذا العام/الفصل (is_deleted=1)
            const no = Number(btn.dataset.no);
            const isCustom = btn.dataset.custom === '1';
            if (!confirm(isCustom ? 'هل تريد حذف هذا العنوان المضاف؟' : 'هل تريد حذف/إخفاء هذا العنوان من التقويم لهذا العام والفصل؟')) return;
            const row = btn.closest('tr');
            if (row) row.remove();
            // نحفظ علامة الحذف في CURRENT.items ليرسلها الحفظ
            const idx = CURRENT.items.findIndex(x=>Number(x.item_no) === no);
            if (idx >= 0) CURRENT.items[idx].is_deleted = 1;
          });
        });
      }
    }

    async function loadCalendar(){
      const year = document.getElementById('academicYear').value.trim();
      const term = document.getElementById('termSelect').value;
      if(!year){ setMsg('warning','أدخل العام الجامعي أولاً.'); return; }
      setMsg('info','جاري التحميل...');
      const r = await fetchJSON(`/academic_calendar/items?academic_year=${encodeURIComponent(year)}&term=${encodeURIComponent(term)}`);
      if(!r.ok){ setMsg('danger', r.json?.message || 'فشل التحميل.'); return; }
      CURRENT = { academic_year: r.json.academic_year, term: r.json.term, items: r.json.items || [] };
      render(CURRENT.items);
      document.getElementById('lastUpdated').textContent = '';
      setMsg('success','تم تحميل الخطة.');
    }

    async function saveCalendar(){
      if(CURRENT_ROLE !== 'admin'){
        setMsg('warning','فقط الأدمن الرئيسي يمكنه حفظ التواريخ.');
        return;
      }
      const year = document.getElementById('academicYear').value.trim();
      const term = document.getElementById('termSelect').value;
      if(!year){ setMsg('warning','أدخل العام الجامعي أولاً.'); return; }

      // اجمع القيم من الجدول (العنوان + التاريخ) مع علامات الحذف
      const rows = Array.from(document.querySelectorAll('#calendarBody tr'));
      const payloadItems = rows.map(tr=>{
        const no = Number((tr.querySelector('.cal-date')||{}).dataset?.no || 0);
        const dateVal = (tr.querySelector('.cal-date')||{}).value || null;
        const titleInp = tr.querySelector('.cal-title');
        const titleVal = titleInp ? (titleInp.value || '') : '';
        return { item_no: no, title: titleVal, event_date: dateVal, is_deleted: 0 };
      });
      // أضف العناصر المحذوفة التي تم حذفها من العرض
      (CURRENT.items || []).forEach(it=>{
        if (it && it.is_deleted) payloadItems.push({ item_no: it.item_no, title: it.title || '', event_date: it.event_date || null, is_deleted: 1 });
      });
      const r = await fetchJSON('/academic_calendar/items', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ academic_year: year, term, items: payloadItems })
      });
      if(!r.ok){ setMsg('danger', r.json?.message || 'فشل الحفظ.'); return; }
      setMsg('success', r.json?.message || 'تم الحفظ.');
      if (r.json?.updated_at) document.getElementById('lastUpdated').textContent = `آخر حفظ: ${r.json.updated_at}`;
      // إعادة تحميل لضمان التناسق
      await loadCalendar();
    }

    document.addEventListener('DOMContentLoaded', async ()=>{
      // معرفة الدور
      try {
        const auth = await fetchJSON('/auth/check');
        CURRENT_ROLE = auth.ok ? auth.json?.role : null;
      } catch(e) {
        CURRENT_ROLE = null;
      }

      document.getElementById('academicYear').value = guessAcademicYear();
      document.getElementById('btnLoad').addEventListener('click', loadCalendar);
      document.getElementById('btnSave').addEventListener('click', saveCalendar);
      const btnAdd = document.getElementById('btnAddTitle');
      if (btnAdd) {
        btnAdd.addEventListener('click', ()=>{
          if (CURRENT_ROLE !== 'admin') return;
          // item_no=0 يعني عنصر جديد وسيتم ترقيمه عند الحفظ
          CURRENT.items = Array.isArray(CURRENT.items) ? CURRENT.items : [];
          CURRENT.items.push({ item_no: 0, title: '', event_date: null, is_custom: true, is_deleted: 0 });
          render(CURRENT.items.filter(x=>!x.is_deleted));
          setMsg('info','أضفت صف عنوان جديد. اكتب العنوان ثم اضغط حفظ.');
        });
      }

      // تحميل مبدئي
      await loadCalendar();
      if (CURRENT_ROLE !== 'admin'){
        document.getElementById('btnSave').disabled = true;
        document.getElementById('btnSave').title = 'متاح للأدمن فقط';
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
