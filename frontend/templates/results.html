<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Schedule Optimizer — التعارضات</title>
  <link href="/static/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% include "base_nav.html" %}
  <main class="container-main">

    <div class="page-header">
      <div>
        <h1 class="page-title">التعارضات</h1>
        <p class="page-subtitle">عرض الجدول النهائي مع إبراز تعارضات الطلبة وإمكانية تنزيل التقارير أو حذف التعارضات</p>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <a href="/" class="btn btn-outline-secondary btn-sm">العودة للإدخال</a>
        <button id="refreshBtn" class="btn btn-primary btn-sm">تحديث</button>
        <button id="recomputeConflictsBtn" class="btn btn-warning btn-sm" title="إعادة حساب تعارضات الجدول لجميع الطلبة (يُظهر تعارضات مثل طالبة حنين)">إعادة حساب التعارضات</button>
      </div>
    </div>

    <section class="mb-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h6 mb-0">الجدول النهائي (عرض شبكي)</h2>
            <div>
              <button class="btn btn-sm btn-outline-primary" id="btnToggleCompactOptim">عرض مضغوط</button>
              <button class="btn btn-sm btn-outline-success" id="dlOptim">تنزيل CSV</button>
            </div>
          </div>
          <div class="timetable-wrapper">
            <div id="calendarContainer"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- نافذة تفاصيل التعارضات لكل خانة في الجدول -->
    <div class="modal fade" id="conflictDetailsModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="conflictDetailsTitle">تفاصيل التعارضات</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="إغلاق"></button>
          </div>
          <div class="modal-body">
            <div class="table-responsive">
              <table class="table table-bordered table-sm" id="conflictDetailsTable">
                <thead class="table-light">
                  <tr>
                    <th>اسم الطالب</th>
                    <th>المقررات المتعارضة</th>
                    <th>الوقت</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">إغلاق</button>
          </div>
        </div>
      </div>
    </div>

    <!-- proposed_moves section removed as requested -->

    <div id="msg" class="mt-3"></div>

<script>
  // helper: escape HTML to avoid XSS and undefined errors
  function escapeHtml(s){ return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

  let IS_COMPACT = false;
  let LAST_CALENDAR_ROWS = [];
  let LATEST_CONFLICTS = [];
  let STUDENT_MAP = {};

  async function loadStudentsForNames(){
    try{
      const resp = await fetch('/list_students');
      const data = await resp.json().catch(()=>null);
      if(resp.ok && Array.isArray(data)){
        STUDENT_MAP = {};
        data.forEach(s=>{
          if(s.student_id){
            STUDENT_MAP[String(s.student_id)] = s.student_name || '';
          }
        });
      }
    }catch(e){
      console.error('failed to load students for conflict names', e);
    }
  }

  function getStudentNameFromMap(studentId){
    const sid = String(studentId||'');
    return STUDENT_MAP[sid] || '';
  }

  function setMsg(html, kind="info") {
    document.getElementById("msg").innerHTML = `<div class="alert alert-${kind} p-2">${html}</div>`;
  }

  // render optimized_schedule as a timetable grid (days as rows, times as columns) - matching schedule_form.html
  const DAYS = ['السبت', 'الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس'];
  
  function parseStartMinutes(timeStr){
    if(!timeStr) return 0;
    const s = String(timeStr).trim();
    const seps = ['-','–','—','/',' to '];
    let part = s;
    for(const sep of seps){ if(s.includes(sep)){ part = s.split(sep)[0].trim(); break; } }
    const m = part.match(/(\d{1,2}):(\d{2})/);
    if(m) return parseInt(m[1],10)*60 + parseInt(m[2],10);
    const n = parseInt(part,10); return isNaN(n)? 0: n;
  }

  function extractUniqueTimeSlots(scheduleRows){
    const times = new Set();
    scheduleRows.forEach(row => {
      if(row.time) times.add(row.time.trim());
    });
    // إذا لم تكن هناك توقيتات، أضف توقيتات افتراضية شائعة
    if(times.size === 0){
      const defaultTimes = [
        '8:00-9:00', '9:00-10:00', '10:00-11:00', '11:00-12:00',
        '12:00-13:00', '13:00-14:00', '14:00-15:00', '15:00-16:00', '16:00-17:00'
      ];
      defaultTimes.forEach(t => times.add(t));
    }
    // ترتيب التوقيتات بشكل ذكي (حسب وقت البداية)
    return Array.from(times).sort((a, b) => {
      return parseStartMinutes(a) - parseStartMinutes(b);
    });
  }

  function groupByTimeSlot(scheduleRows){
    const slots = {};
    scheduleRows.forEach(row => {
      const day = (row.day || '').trim();
      const time = (row.time || '').trim();
      if(!day || !time) return;
      const key = `${day}|${time}`;
      if(!slots[key]) slots[key] = [];
      slots[key].push(row);
    });
    return slots;
  }

  // Color generation for courses (matching schedule_form.html)
  const courseColors = {};
  const colorPalette = [
    '#ffc107', '#28a745', '#17a2b8', '#6f42c1', '#fd7e14', 
    '#20c997', '#e83e8c', '#6610f2', '#ff6b6b', '#4ecdc4'
  ];
  let colorIndex = 0;
  function getCourseColor(courseName){
    if(!courseColors[courseName]){
      courseColors[courseName] = colorPalette[colorIndex % colorPalette.length];
      colorIndex++;
    }
    return courseColors[courseName];
  }

  function getConflictsForSlot(day, time){
    const d = (day || '').trim();
    const t = (time || '').trim();
    return (LATEST_CONFLICTS || []).filter(c => (String(c.day||'').trim() === d) && (String(c.time||'').trim() === t));
  }

  function renderCalendar(rows){
    const container = document.getElementById('calendarContainer');
    container.innerHTML = '';
    LAST_CALENDAR_ROWS = Array.isArray(rows) ? rows : [];
    if(!rows || !rows.length){ 
      container.innerHTML = '<div class="alert alert-info p-2">لا يوجد صف في الجدول النهائي</div>'; 
      return; 
    }
    
    // Extract time slots and group by day/time
    const timeSlots = extractUniqueTimeSlots(rows);
    const slotsMap = groupByTimeSlot(rows);

    // Create timetable: days as rows, times as columns (matching schedule_form.html)
    const compactClass = IS_COMPACT ? ' is-compact' : '';
    let html = `<table class="timetable${compactClass}"><thead><tr><th class="day-header">اليوم / الوقت</th>`;
    timeSlots.forEach(time => {
      html += `<th class="time-header">${escapeHtml(time)}</th>`;
    });
    html += '</tr></thead><tbody>';

    DAYS.forEach(day => {
      html += `<tr><th class="day-header">${day}</th>`;
      timeSlots.forEach(time => {
        const key = `${day}|${time}`;
        const courses = slotsMap[key] || [];
        html += `<td class="time-slot-cell">`;
        const slotConflicts = getConflictsForSlot(day, time);
        if (slotConflicts.length > 0) {
          html += `<button 
                     class="btn btn-sm btn-danger conflict-slot-btn" 
                     data-day="${escapeHtml(day)}" 
                     data-time="${escapeHtml(time)}">
                     يوجد تعارض (${slotConflicts.length})
                   </button>`;
        } else {
          // لا نعرض شيئاً في حالة عدم وجود تعارضات في هذا التوقيت
        }
        html += `</td>`;
      });
      html += '</tr>';
    });

    html += '</tbody></table>';
    container.innerHTML = html;

    document.querySelectorAll('.conflict-slot-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const day = btn.getAttribute('data-day') || '';
        const time = btn.getAttribute('data-time') || '';
        showConflictDetails(day, time);
      });
    });
  }

  // compact toggle
  const btnCompact = document.getElementById('btnToggleCompactOptim');
  if (btnCompact) {
    btnCompact.addEventListener('click', () => {
      IS_COMPACT = !IS_COMPACT;
      btnCompact.textContent = IS_COMPACT ? 'عرض عادي' : 'عرض مضغوط';
      renderCalendar(LAST_CALENDAR_ROWS);
    });
  }

  let conflictDetailsModal = null;

  function showConflictDetails(day, time){
    const conflicts = getConflictsForSlot(day, time);
    const titleEl = document.getElementById('conflictDetailsTitle');
    const tbody = document.querySelector('#conflictDetailsTable tbody');
    if(titleEl) titleEl.textContent = `تفاصيل التعارضات ليوم ${day} في الوقت ${time}`;
    if(tbody){
      tbody.innerHTML = '';
      if(conflicts.length === 0){
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 3;
        td.textContent = 'لا توجد تعارضات في هذا التوقيت.';
        tr.appendChild(td);
        tbody.appendChild(tr);
      } else {
        conflicts.forEach(c => {
          const tr = document.createElement('tr');
          const tdSid = document.createElement('td');
          const name = getStudentNameFromMap(c.student_id) || '';
          tdSid.textContent = name || (c.student_id || '');
          const tdCourses = document.createElement('td');
          tdCourses.textContent = c.conflicting_sections || '';
          const tdTime = document.createElement('td');
          tdTime.textContent = c.time || '';
          tr.appendChild(tdSid);
          tr.appendChild(tdCourses);
          tr.appendChild(tdTime);
          tbody.appendChild(tr);
        });
      }
    }
    if(!conflictDetailsModal){
      const modalEl = document.getElementById('conflictDetailsModal');
      if(modalEl){
        conflictDetailsModal = new bootstrap.Modal(modalEl);
      }
    }
    if(conflictDetailsModal){
      conflictDetailsModal.show();
    }
  }

  async function fetchResults() {
    setMsg("جلب النتائج من الخادم...", "info");
    try {
      const resp = await fetch("/results_data");
      if (!resp.ok) throw new Error(resp.statusText);
      const data = await resp.json();

      LATEST_CONFLICTS = Array.isArray(data.conflict_report) ? data.conflict_report : [];
      renderCalendar(data.optimized_schedule);

      setMsg("تم تحميل النتائج.", "success");
    } catch (err) {
      console.error(err);
      setMsg("فشل جلب النتائج: " + err.message, "danger");
    }
  }

  // proposed_moves UI removed from results page

  async function downloadCSV(table) {
    try {
      const resp = await fetch(`/download_csv?table=${encodeURIComponent(table)}`);
      if (!resp.ok) throw new Error(resp.statusText);
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = table + ".csv";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    } catch (err) {
      setMsg("فشل تنزيل CSV: " + err.message, "danger");
    }
  }

  document.getElementById("dlOptim").addEventListener("click", () => downloadCSV("optimized_schedule"));
  document.getElementById("refreshBtn").addEventListener("click", fetchResults);

  document.getElementById("recomputeConflictsBtn").addEventListener("click", async function() {
    const btn = this;
    btn.disabled = true;
    btn.textContent = "جاري الحساب...";
    setMsg("جاري إعادة حساب التعارضات لجميع الطلبة...", "info");
    try {
      const r = await fetch("/students/recompute_conflicts", { method: "POST", credentials: "include" });
      const j = await r.json().catch(() => ({}));
      if (r.ok && j.status === "ok") {
        setMsg((j.message || "تم تحديث التعارضات.") + " جاري تحديث العرض...", "success");
        await fetchResults();
      } else {
        setMsg(j.message || "فشل إعادة الحساب.", "danger");
      }
    } catch (e) {
      setMsg("خطأ في الاتصال بالخادم.", "danger");
    }
    btn.disabled = false;
    btn.textContent = "إعادة حساب التعارضات";
  });

  // تحديث تلقائي كل 5 ثوانٍ
  (async function initResultsPage(){
    await loadStudentsForNames();
    await fetchResults();
    setInterval(fetchResults, 5000);
  })();
</script>
<!-- Bootstrap JS for modal support -->
<script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
  </main>
</body>
</html>
