<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>تقرير المقررات الاختيارية</title>
  <link href="/static/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
{% include "base_nav.html" %}

<main class="container-main container-1100">
  <div class="page-header">
    <div>
      <h1 class="page-title">تقرير المقررات الاختيارية</h1>
      <p class="page-subtitle">الطلبة الذين تجاوزوا 100 وحدة ولم يكملوا 3 مقررات اختيارية (بدون استثناء)</p>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-success btn-sm" href="/students/electives_report/excel">تصدير Excel</a>
      <a class="btn btn-outline-danger btn-sm" href="/students/electives_report/pdf" target="_blank">تصدير PDF</a>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div id="msg" class="mb-2"></div>
      <div class="table-responsive">
        <table class="table table-sm table-bordered mb-0" id="tbl">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>رقم الطالب</th>
              <th>الاسم</th>
              <th class="text-center">الوحدات المكتملة</th>
              <th class="text-center">الاختيارية المكتملة</th>
              <th class="text-center">المطلوب</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
async function fetchJSON(url, opts){
  const r = await fetch(url, opts);
  const j = await r.json().catch(()=>null);
  return {ok:r.ok,status:r.status,json:j};
}
function setMsg(kind, text){
  const el = document.getElementById('msg');
  el.innerHTML = text ? `<div class="alert alert-${kind} p-2 mb-0">${text}</div>` : '';
}

async function load(){
  const r = await fetchJSON('/students/electives_report');
  const tb = document.querySelector('#tbl tbody');
  tb.innerHTML = '';
  if(!r.ok){
    setMsg('danger', r.json?.message || 'فشل تحميل التقرير');
    return;
  }
  const items = r.json?.items || [];
  if(!items.length){
    tb.innerHTML = '<tr><td colspan="6" class="text-center text-muted">لا توجد بيانات</td></tr>';
    return;
  }
  items.forEach((it, idx)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${idx+1}</td>
      <td>${it.student_id || ''}</td>
      <td>${it.student_name || ''}</td>
      <td class="text-center">${it.completed_units ?? ''}</td>
      <td class="text-center">${it.electives_completed ?? ''}</td>
      <td class="text-center">${it.required_electives ?? 3}</td>
    `;
    tb.appendChild(tr);
  });
}
load();
</script>

</body>
</html>
